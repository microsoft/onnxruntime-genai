# =============================================================================
# TEMPORARY: Packaging pipeline scratch entry point (Phase 1 pipeline check).
#
# This file normally hosts the nuget-publishing pipeline. It has been
# repurposed to drive the packaging redesign's scratch validation pipeline so
# the reusable core-packaging-stage templates can be exercised on real 1ES pool
# agents without registering a new pipeline. The original nuget-publishing
# content is preserved in git history and will be superseded by the unified
# packaging pipeline in Phase 5.
#
# Phase 1 reduced matrix: win-x64 CPU + linux-x64 CPU.
# Validation: core build + CPack archive + CMake package installed correctly.
# See .pipelines/stages/packaging-scratch-stage.yml.
# =============================================================================
parameters:
  - name: ort_version
    displayName: 'ORT version (downloaded from the Lotus feed)'
    type: string
    default: '1.26.0'

  - name: cuda_version
    displayName: 'CUDA version'
    type: string
    default: '13.1'
    values:
      - '13.1'
      - '12.8'

resources:
  repositories:
    - repository: 1esPipelines
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

trigger: none

variables:
- template: lotus-feed-variables.yml

extends:
  # Registered production pipeline (id 1385): the aiinfra org's 1ES drift
  # management requires extending the *Official* template. The Unofficial
  # template is rejected for this pipeline id.
  template: v1/1ES.Official.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: 'onnxruntime-Win-CPU-2022'
      os: windows
    sdl:
      policheck:
        enabled: true
        break: true
        exclusionsFile: '$(Build.SourcesDirectory)\.pipelines\policheck_exclusions.xml'
      tsa:
        enabled: true
        configFile: '$(Build.SourcesDirectory)\.config\tsaoptions.json'
    stages:
      - template: stages/packaging-scratch-stage.yml
        parameters:
          ort_version: ${{ parameters.ort_version }}
          cuda_version: ${{ parameters.cuda_version }}
