# =============================================================================
# TEMPORARY: Packaging pipeline scratch entry point (Phase 0 pipeline check).
#
# This file normally hosts the nuget-publishing pipeline. It has been
# repurposed to drive the packaging redesign's scratch validation pipeline so
# the incremental core + SDK machinery can be exercised on real 1ES pool agents
# without registering a new pipeline in ADO. The original nuget-publishing
# content is preserved in git history and will be superseded by the unified
# packaging pipeline in Phase 5.
#
# Reduced matrix: win-x64 (CPU) + linux-x64 (CPU). It builds the core once,
# installs the exported find_package(onnxruntime-genai) package, links a probe
# consumer against it, then builds the Python SDK incrementally and asserts the
# wheel imports. See .pipelines/stages/packaging-scratch-stage.yml.
# =============================================================================
parameters:
  - name: ort_version
    displayName: 'ORT version (downloaded from the Lotus feed)'
    type: string
    default: '1.26.0'

resources:
  repositories:
    - repository: 1esPipelines
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

trigger: none

extends:
  # Non-production scratch pipeline: use the 1ES Unofficial template for faster,
  # lighter runs (no production signing/SDL injection required to validate the
  # build machinery).
  template: v1/1ES.Unofficial.PipelineTemplate.yml@1esPipelines
  parameters:
    pool:
      name: 'onnxruntime-Win-CPU-2022'
      os: windows
    stages:
      - template: stages/packaging-scratch-stage.yml
        parameters:
          ort_version: ${{ parameters.ort_version }}
