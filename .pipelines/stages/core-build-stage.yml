# Stage 1 — Core native build for a single execution provider (EP).
# Invoked once per EP (cpu, cuda) so a failure in one EP's core build never skips
# the other EP's downstream SDK stages (failure isolation at EP granularity).
# Each enabled (platform, arch) builds the native core once via build.py and publishes
# the C/C++ SDK + exported core artifact consumed by the matching Stage 2 SDK stages.
parameters:
- name: ep
  type: string            # 'cpu' | 'cuda'
- name: ep_label
  type: string            # display label, e.g. 'CPU' | 'CUDA'
- name: enable_linux_x64
  type: boolean
  default: false
- name: enable_linux_arm64
  type: boolean
  default: false
- name: enable_win_x64
  type: boolean
  default: false
- name: enable_win_arm64
  type: boolean
  default: false
- name: enable_macos_arm64
  type: boolean
  default: false
- name: cuda_version
  type: string
  default: '13.1'
- name: build_config
  type: string
  default: 'RelWithDebInfo'
- name: ort_build_version
  type: string
  default: 'default'
- name: ort_build_source
  type: string
  default: 'NuGet'

stages:
- stage: core_build_${{ parameters.ep }}
  displayName: 'Core Build · ${{ parameters.ep_label }}'
  dependsOn: []
  jobs:
  - ${{ if eq(parameters.enable_linux_x64, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'linux'
        arch: 'x64'
        ep: ${{ parameters.ep }}
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_linux_arm64, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'linux'
        arch: 'arm64'
        ep: ${{ parameters.ep }}
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_x64, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'win'
        arch: 'x64'
        ep: ${{ parameters.ep }}
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_arm64, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'win'
        arch: 'arm64'
        ep: ${{ parameters.ep }}
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_macos_arm64, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'osx'
        arch: 'arm64'
        ep: ${{ parameters.ep }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}
