# Stage 1 — Core native build matrix (single source of truth for the support matrix).
# Each enabled (platform, device, arch) builds the native core once via build.py and
# publishes the C/C++ SDK + exported core artifact consumed by Stage 2 SDK jobs.
parameters:
- name: enable_linux_x64_cpu
  type: boolean
  default: true
- name: enable_linux_arm64_cpu
  type: boolean
  default: true
- name: enable_linux_x64_cuda
  type: boolean
  default: true
- name: enable_linux_arm64_cuda
  type: boolean
  default: true
- name: enable_win_x64_cpu
  type: boolean
  default: true
- name: enable_win_arm64_cpu
  type: boolean
  default: true
- name: enable_win_x64_cuda
  type: boolean
  default: true
- name: enable_win_arm64_cuda
  type: boolean
  default: true
- name: enable_macos_arm64_cpu
  type: boolean
  default: true
- name: cuda_version
  type: string
  default: '13.1'
- name: build_config
  type: string
  default: 'RelWithDebInfo'
- name: ort_build_version
  type: string
  default: 'default'
- name: ort_build_source
  type: string
  default: 'NuGet'

stages:
- stage: core_build
  displayName: 'Core native build'
  jobs:
  - ${{ if eq(parameters.enable_linux_x64_cpu, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'linux'
        arch: 'x64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_linux_arm64_cpu, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'linux'
        arch: 'arm64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_linux_x64_cuda, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'linux'
        arch: 'x64'
        ep: 'cuda'
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_linux_arm64_cuda, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'linux'
        arch: 'arm64'
        ep: 'cuda'
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_x64_cpu, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'win'
        arch: 'x64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_arm64_cpu, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'win'
        arch: 'arm64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_x64_cuda, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'win'
        arch: 'x64'
        ep: 'cuda'
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_arm64_cuda, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'win'
        arch: 'arm64'
        ep: 'cuda'
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_macos_arm64_cpu, true) }}:
    - template: jobs/core-build-job.yml
      parameters:
        os: 'osx'
        arch: 'arm64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}
