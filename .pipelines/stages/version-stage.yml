# =============================================================================
# version-stage.yml — Package version computation stage.
#
# Computes the GenAI package version ONCE for the whole run and exposes it as a
# stage output variable, so every downstream packaging stage stamps the SAME
# version (no cross-job date skew when parallel jobs straddle midnight).
#
# The version is a SINGLE string valid simultaneously for PEP 440 (Python
# wheels), SemVer/NuGet, and Maven (Java), so every package family stamps the
# exact same version. Package jobs write it into VERSION_INFO on disk via
# utils/apply-genai-version.yml before building.
#
# Format (VERSION_INFO's trailing '-dev' is stripped to form the base):
#   stable : X.Y.Z                    (from VERSION_INFO)
#   dev    : X.Y.Z-dev<yyyymmdd><BuildId>
#            e.g. 0.15.0-dev20260720123456  (PEP 440 -> 0.15.0.dev20260720123456)
#
# Consume downstream via (stage must dependsOn 'version'):
#   variables:
#   - name: genai_version
#     value: $[ stageDependencies.version.set_version.outputs['setver.genai_version'] ]
#
# Display-name convention:
#   Stage:  Version
#   Job:    version · compute
# =============================================================================

parameters:
- name: version_type
  type: string
  default: 'dev'
  values:
    - 'dev'
    - 'stable'

stages:
- stage: version
  displayName: 'Version'
  dependsOn: []
  jobs:
  - job: set_version
    displayName: 'version · compute'
    pool:
      name: 'onnxruntime-Win-CPU-2022'
      os: windows
    steps:
    - checkout: self
      clean: true
    - task: PowerShell@2
      name: setver
      displayName: 'Compute genai_version (${{ parameters.version_type }})'
      inputs:
        workingDirectory: $(Build.SourcesDirectory)
        targetType: inline
        script: |
          $ErrorActionPreference = 'Stop'
          $version_info = (Get-Content -Path .\VERSION_INFO).Trim()
          # Strip a single trailing '-dev' to form the base X.Y.Z; the dev suffix
          # (date + BuildId) is re-appended below so the string stays valid for
          # PEP 440 / SemVer / Maven.
          $base = $version_info -replace '-dev$', ''
          $build_id = $env:BUILD_BUILDID
          $date = (Get-Date).ToString('yyyyMMdd')
          $version = switch ('${{ parameters.version_type }}') {
            'dev'    { "$base-dev$date$build_id" }
            'stable' { "$base" }
            default  { throw "unknown version_type: ${{ parameters.version_type }}" }
          }
          Write-Host "VERSION_INFO   : $version_info"
          Write-Host "base           : $base"
          Write-Host "version_type   : ${{ parameters.version_type }}"
          Write-Host "build_id       : $build_id"
          Write-Host "genai_version  : $version"
          Write-Host "##vso[task.setvariable variable=genai_version;isOutput=true]$version"
