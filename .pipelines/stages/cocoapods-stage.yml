# =============================================================================
# cocoapods-stage.yml — macOS/iOS CocoaPods packaging stage.
#
# Builds and assembles the two published CocoaPods for Apple app developers:
#   onnxruntime-genai-c     — C API pod
#   onnxruntime-genai-objc  — Objective-C binding pod (src/objectivec)
#
# Like the iOS xcframework stage this is a bespoke Apple build
# (build_and_assemble_apple_pods.py, which internally drives build_apple_framework.py)
# that does NOT fit the core-archive + incremental SDK model, so it runs as a
# self-contained macOS stage. Feed-isolated to the internal Lotus feed (pip).
# Tests are intentionally skipped (packaging does not run device tests — goal 3),
# which also drops the huggingface_hub model-download dependency.
#
# Publishes artifact 'onnxruntime-genai-cocoapods'.
# =============================================================================

parameters:
- name: build_config
  type: string
  default: Release
- name: ort_version
  type: string
- name: enable_cpu
  type: boolean
  default: true

stages:
- ${{ if eq(parameters.enable_cpu, true) }}:
  - stage: cocoapods
    displayName: 'Core · Apple (CocoaPods)'
    dependsOn:
    - version
    variables:
    - name: genai_version
      value: $[ stageDependencies.version.set_version.outputs['setver.genai_version'] ]
    jobs:
    - job: macos_ios_cocoapods
      displayName: 'apple · macos-ios · cocoapods'
      pool:
        name: 'Azure Pipelines'
        image: 'macOS-latest'
        os: macOS
      timeoutInMinutes: 180
      workspace:
        clean: all
      variables:
        buildSettingsFile: 'tools/ci_build/github/apple/default_full_apple_framework_build_settings.json'
        cPodName: onnxruntime-genai-c
        objcPodName: onnxruntime-genai-objc
      steps:
      - checkout: self
        clean: true
        submodules: none

      - template: jobs/steps/utils/apply-genai-version.yml
        parameters:
          os: macos
      - template: jobs/steps/utils/set-cmake-build-type.yml
        parameters:
          build_config: ${{ parameters.build_config }}

      - template: jobs/steps/utils/download-apple-ort.yml
        parameters:
          ort_version: ${{ parameters.ort_version }}

      # --- Feed isolation: pip → Lotus (no pypi.org fallback) -----------------
      - task: PipAuthenticate@1
        displayName: 'Authenticate pip to Lotus feed'
        inputs:
          artifactFeeds: '$(lotusFeedName)'
          onlyAddExtraIndex: false

      - task: CmdLine@2
        displayName: 'Build macOS & iOS CocoaPods'
        inputs:
          script: |
            set -e -x
            python3 -m pip install --user --break-system-packages requests
            python3 tools/ci_build/github/apple/build_and_assemble_apple_pods.py \
              --build-dir "$(Build.BinariesDirectory)/apple_framework" \
              --staging-dir "$(Build.BinariesDirectory)/staging" \
              --pod-version "$(genai_version)" \
              --variant Full \
              --build-settings-file "${{ variables.buildSettingsFile }}" \
              --build-apple-framework-arg=--config=$(cmake_build_type) \
              --ort-home "$(Build.BinariesDirectory)/ort_home" \
              --ort-version ${{ parameters.ort_version }}

      - script: |
          set -e -x
          for POD_NAME in "${{ variables.cPodName }}" "${{ variables.objcPodName }}";
          do
            ./tools/ci_build/github/apple/assemble_apple_packaging_artifacts.sh \
              "$(Build.BinariesDirectory)/staging" \
              "$(Build.ArtifactStagingDirectory)" \
              "${POD_NAME}" \
              "$(genai_version)"
          done
        displayName: 'Assemble CocoaPods artifacts'

      - script: |
          set -e -x
          ls -R "$(Build.ArtifactStagingDirectory)"
        displayName: 'List staged CocoaPods artifacts'

      - task: 1ES.PublishPipelineArtifact@1
        displayName: 'Publish CocoaPods artifacts'
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)'
          artifactName: 'onnxruntime-genai-cocoapods'
