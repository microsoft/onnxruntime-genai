# =============================================================================
# sdk-python-stage.yml — Python SDK (wheel) stage.
#
# ALL Python wheels are produced by this single stage, one job per (os, arch, EP),
# incrementally against the prebuilt core. Fixed platform matrix per EP:
#   CPU   — win-x64, win-arm64, linux-x64, linux-arm64, osx-arm64
#   CUDA  — win-x64, win-arm64, linux-x64
#   WinML — win-x64, win-arm64
# Wheels are built for every requested Python version (the core is Python-agnostic
# and built once; only the pybind extension + wheel are rebuilt per version).
#
# NOTE on granularity: ADO job dependencies are within a stage, so this SDK stage
# depends on the whole Core stage(s) it consumes (not per-core-job). This keeps
# the clean Core·/SDK· separation at the cost of waiting for all core jobs of the
# enabled EP(s) to finish. Acceptable for the packaging cadence.
#
# Display-name / artifact convention:
#   Stage:    SDK · Python
#   Jobs:     python · <os>-<arch> · <ep>
#   Artifact: python-wheel-<os>-<arch>-<ep>
# =============================================================================

parameters:
- name: ort_version
  type: string
- name: ort_dependency_version
  type: string
  default: '1.27.0'
- name: winml_sdk_version
  type: string
- name: cuda_version
  type: string
  default: '13.1'
# Python versions to build a wheel for (fixed, not a pipeline input). The core is
# Python-agnostic (built once); only the pybind extension + wheel are (re)built per
# version — the incremental win.
- name: python_versions
  type: object
  default: [ '3.11', '3.12', '3.13', '3.14' ]

- name: enable_cpu
  type: boolean
  default: true
- name: enable_cuda
  type: boolean
  default: true
- name: enable_winml
  type: boolean
  default: true

- name: build_config
  type: string
  default: Release

stages:
- stage: sdk_python
  displayName: 'SDK · Python'
  # Depend only on the core stage(s) this stage actually consumes.
  dependsOn:
  - ${{ if eq(parameters.enable_cpu, true) }}:
    - core_cpu
  - ${{ if eq(parameters.enable_cuda, true) }}:
    - core_cuda
  - ${{ if eq(parameters.enable_winml, true) }}:
    - core_winml
  jobs:

  # ---- CPU wheels ----------------------------------------------------------
  - ${{ if eq(parameters.enable_cpu, true) }}:
    - template: jobs/sdk-python-job.yml
      parameters:
        os: win
        arch: x64
        ep: cpu
        ort_version: ${{ parameters.ort_version }}
        python_versions: ${{ parameters.python_versions }}
        python_dependency_version: ${{ parameters.ort_dependency_version }}
    - template: jobs/sdk-python-job.yml
      parameters:
        os: win
        arch: arm64
        ep: cpu
        ort_version: ${{ parameters.ort_version }}
        python_versions: ${{ parameters.python_versions }}
        python_dependency_version: ${{ parameters.ort_dependency_version }}
    - template: jobs/sdk-python-job.yml
      parameters:
        os: linux
        arch: x64
        ep: cpu
        ort_version: ${{ parameters.ort_version }}
        python_versions: ${{ parameters.python_versions }}
        python_dependency_version: ${{ parameters.ort_dependency_version }}
    - template: jobs/sdk-python-job.yml
      parameters:
        os: linux
        arch: arm64
        ep: cpu
        ort_version: ${{ parameters.ort_version }}
        python_versions: ${{ parameters.python_versions }}
        python_dependency_version: ${{ parameters.ort_dependency_version }}
    - template: jobs/sdk-python-job.yml
      parameters:
        os: osx
        arch: arm64
        ep: cpu
        ort_version: ${{ parameters.ort_version }}
        python_versions: ${{ parameters.python_versions }}
        python_dependency_version: ${{ parameters.ort_dependency_version }}

  # ---- CUDA wheels ---------------------------------------------------------
  - ${{ if eq(parameters.enable_cuda, true) }}:
    - template: jobs/sdk-python-job.yml
      parameters:
        os: win
        arch: x64
        ep: cuda
        cuda_version: ${{ parameters.cuda_version }}
        ort_version: ${{ parameters.ort_version }}
        python_versions: ${{ parameters.python_versions }}
        python_dependency_version: ${{ parameters.ort_dependency_version }}
    - template: jobs/sdk-python-job.yml
      parameters:
        os: win
        arch: arm64
        ep: cuda
        cuda_version: ${{ parameters.cuda_version }}
        ort_version: ${{ parameters.ort_version }}
        python_versions: ${{ parameters.python_versions }}
        python_dependency_version: ${{ parameters.ort_dependency_version }}
    - template: jobs/sdk-python-job.yml
      parameters:
        os: linux
        arch: x64
        ep: cuda
        cuda_version: ${{ parameters.cuda_version }}
        ort_version: ${{ parameters.ort_version }}
        python_versions: ${{ parameters.python_versions }}
        python_dependency_version: ${{ parameters.ort_dependency_version }}

  # ---- WinML wheels (win-x64 + win-arm64; multi-version, incremental) -------
  - ${{ if eq(parameters.enable_winml, true) }}:
    - job: python_win_x64_winml
      displayName: 'python · win-x64 · winml'
      pool:
        name: 'onnxruntime-Win-CPU-2022'
        os: windows
      timeoutInMinutes: 120
      workspace:
        clean: all
      variables:
      - name: artifactName
        value: 'python-wheel-win-x64-winml'
      - name: corePkgDir
        value: '$(Build.SourcesDirectory)\core_pkg'
      - name: ortHome
        value: '$(Build.SourcesDirectory)\ort_home'
      - name: pysdkBuildDir
        value: 'build/pysdk'
      # Scope Guardian's codesign/SARIF analysis to the small wheel staging dir
      # (matches the other Windows python jobs) so the injected sarifpatternmatcher
      # does not scan the whole build tree.
      - name: GDN_CODESIGN_TARGETDIRECTORY
        value: '$(Build.ArtifactStagingDirectory)/wheel'
      steps:
      - checkout: self
        submodules: recursive
        lfs: true
        clean: true
      - template: jobs/steps/sdk-python-winml-win-step.yml
        parameters:
          arch: x64
          ep: winml
          build_config: ${{ parameters.build_config }}
          winml_sdk_version: ${{ parameters.winml_sdk_version }}
          core_artifact: 'core-win-x64-winml-cmake-pkg'
          python_versions: ${{ parameters.python_versions }}
      - template: jobs/steps/compliant-and-cleanup-step.yml

    - job: python_win_arm64_winml
      displayName: 'python · win-arm64 · winml'
      pool:
        name: 'onnxruntime-genai-windows-vs-2022-arm64'
        hostArchitecture: Arm64
        os: windows
      timeoutInMinutes: 120
      workspace:
        clean: all
      variables:
      - name: artifactName
        value: 'python-wheel-win-arm64-winml'
      - name: corePkgDir
        value: '$(Build.SourcesDirectory)\core_pkg'
      - name: ortHome
        value: '$(Build.SourcesDirectory)\ort_home'
      - name: pysdkBuildDir
        value: 'build/pysdk'
      # Scope Guardian's codesign/SARIF analysis to the small wheel staging dir
      # (matches the other Windows python jobs) so the injected sarifpatternmatcher
      # does not scan the whole build tree.
      - name: GDN_CODESIGN_TARGETDIRECTORY
        value: '$(Build.ArtifactStagingDirectory)/wheel'
      steps:
      - checkout: self
        submodules: recursive
        lfs: true
        clean: true
      - template: jobs/steps/sdk-python-winml-win-step.yml
        parameters:
          arch: arm64
          ep: winml
          build_config: ${{ parameters.build_config }}
          winml_sdk_version: ${{ parameters.winml_sdk_version }}
          core_artifact: 'core-win-arm64-winml-cmake-pkg'
          python_versions: ${{ parameters.python_versions }}
      - template: jobs/steps/compliant-and-cleanup-step.yml
