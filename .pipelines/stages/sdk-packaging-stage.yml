# Stage 2 — SDK packaging. Every SDK job consumes the Stage 1 core artifact
# incrementally (the native core is never rebuilt). Currently wires the Python
# wheel; NuGet / Java-AAR / Apple-CocoaPods / Foundry are composed from their
# own stages in packaging.yml.
parameters:
- name: enable_linux_x64_cpu
  type: boolean
  default: true
- name: enable_linux_arm64_cpu
  type: boolean
  default: true
- name: enable_linux_x64_cuda
  type: boolean
  default: true
- name: enable_linux_arm64_cuda
  type: boolean
  default: true
- name: enable_win_x64_cpu
  type: boolean
  default: true
- name: enable_win_arm64_cpu
  type: boolean
  default: true
- name: enable_win_x64_cuda
  type: boolean
  default: true
- name: enable_win_arm64_cuda
  type: boolean
  default: true
- name: enable_macos_arm64_cpu
  type: boolean
  default: true
- name: cuda_version
  type: string
  default: '13.1'
- name: build_config
  type: string
  default: 'RelWithDebInfo'
- name: ort_version
  type: string
  default: ''
- name: ort_cuda_version
  type: string
  default: ''
- name: ort_build_version
  type: string
  default: 'default'
- name: ort_build_source
  type: string
  default: 'NuGet'

stages:
- stage: python_wheel
  displayName: 'Python wheel (incremental)'
  dependsOn: core_build
  jobs:
  - ${{ if eq(parameters.enable_linux_x64_cpu, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'linux'
        arch: 'x64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_linux_arm64_cpu, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'linux'
        arch: 'arm64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_linux_x64_cuda, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'linux'
        arch: 'x64'
        ep: 'cuda'
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_cuda_version }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_linux_arm64_cuda, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'linux'
        arch: 'arm64'
        ep: 'cuda'
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_cuda_version }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_x64_cpu, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'win'
        arch: 'x64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_arm64_cpu, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'win'
        arch: 'arm64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_x64_cuda, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'win'
        arch: 'x64'
        ep: 'cuda'
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_cuda_version }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_win_arm64_cuda, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'win'
        arch: 'arm64'
        ep: 'cuda'
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_cuda_version }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - ${{ if eq(parameters.enable_macos_arm64_cpu, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'osx'
        arch: 'arm64'
        ep: 'cpu'
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}
