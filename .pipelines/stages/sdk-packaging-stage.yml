# Stage 2 — Python wheel packaging for a single execution provider (EP).
# Invoked once per EP (cpu, cuda); depends only on that EP's core stage so a CUDA
# core failure never skips the CPU wheels (and vice versa). Each enabled (platform,
# arch) builds its wheel(s) from the prebuilt core, then a collector job aggregates
# every flavor's wheels into a single per-EP artifact (mirrors the NuGet packaging).
parameters:
- name: ep
  type: string            # 'cpu' | 'cuda'
- name: ep_label
  type: string            # display label, e.g. 'CPU' | 'CUDA'
- name: enable_linux_x64
  type: boolean
  default: false
- name: enable_linux_arm64
  type: boolean
  default: false
- name: enable_win_x64
  type: boolean
  default: false
- name: enable_win_arm64
  type: boolean
  default: false
- name: enable_macos_arm64
  type: boolean
  default: false
- name: cuda_version
  type: string
  default: '13.1'
- name: build_config
  type: string
  default: 'RelWithDebInfo'
- name: ort_version
  type: string
  default: ''
- name: ort_build_version
  type: string
  default: '1.26.0'

stages:
- stage: python_wheel_${{ parameters.ep }}
  displayName: 'Python Wheels · ${{ parameters.ep_label }}'
  dependsOn: core_build_${{ parameters.ep }}
  jobs:
  - ${{ if eq(parameters.enable_linux_x64, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'linux'
        arch: 'x64'
        ep: ${{ parameters.ep }}
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}

  - ${{ if eq(parameters.enable_linux_arm64, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'linux'
        arch: 'arm64'
        ep: ${{ parameters.ep }}
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}

  - ${{ if eq(parameters.enable_win_x64, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'win'
        arch: 'x64'
        ep: ${{ parameters.ep }}
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}

  - ${{ if eq(parameters.enable_win_arm64, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'win'
        arch: 'arm64'
        ep: ${{ parameters.ep }}
        cuda_version: ${{ parameters.cuda_version }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}

  - ${{ if eq(parameters.enable_macos_arm64, true) }}:
    - template: jobs/python-wheel-job.yml
      parameters:
        os: 'osx'
        arch: 'arm64'
        ep: ${{ parameters.ep }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        ort_build_version: ${{ parameters.ort_build_version }}

  # Aggregate every flavor's per-flavor *-wheel artifacts into one per-EP wheels artifact.
  - job: collect_wheels_${{ parameters.ep }}
    displayName: 'Collect wheels'
    pool:
      name: 'onnxruntime-Ubuntu2204-AMD-CPU'
      os: linux
    dependsOn:
    - ${{ if eq(parameters.enable_linux_x64, true) }}:
      - wheel_linux_${{ parameters.ep }}_x64
    - ${{ if eq(parameters.enable_linux_arm64, true) }}:
      - wheel_linux_${{ parameters.ep }}_arm64
    - ${{ if eq(parameters.enable_win_x64, true) }}:
      - wheel_win_${{ parameters.ep }}_x64
    - ${{ if eq(parameters.enable_win_arm64, true) }}:
      - wheel_win_${{ parameters.ep }}_arm64
    - ${{ if eq(parameters.enable_macos_arm64, true) }}:
      - wheel_osx_${{ parameters.ep }}_arm64
    steps:
    - checkout: none
    - download: none
    - task: DownloadPipelineArtifact@2
      displayName: 'Download per-flavor wheels'
      inputs:
        buildType: 'current'
        itemPattern: 'onnxruntime-genai-*-${{ parameters.ep }}-*-wheel/**/*.whl'
        targetPath: '$(Build.ArtifactStagingDirectory)/downloaded'
    - bash: |
        set -e -x
        mkdir -p '$(Build.ArtifactStagingDirectory)/wheels'
        find '$(Build.ArtifactStagingDirectory)/downloaded' -name '*.whl' -exec cp {} '$(Build.ArtifactStagingDirectory)/wheels/' \;
        ls -l '$(Build.ArtifactStagingDirectory)/wheels'
      displayName: 'Flatten wheels'
    - task: 1ES.PublishPipelineArtifact@1
      displayName: 'Publish Artifact: ${{ parameters.ep_label }} wheels'
      inputs:
        artifactName: 'onnxruntime-genai-${{ parameters.ep }}-wheels'
        targetPath: '$(Build.ArtifactStagingDirectory)/wheels'
