# =============================================================================
# foundry-packaging-job.yml — .Foundry custom-ORT NuGet repackage job (Phase 4).
#
# Repackages the prebuilt core native binaries against a *custom* ONNX Runtime
# NuGet package (the ".Foundry" flavor, or any custom ORT variant), producing
# Microsoft.ML.OnnxRuntimeGenAI.<suffix>. This is a faithful port of the former
# custom-nuget-packaging-job.yml, updated to consume the NEW core archive
# artifacts (core-<os>-<arch>-<ep>-archive) instead of the old *-capi artifacts.
#
# The custom ORT package name/version is derived from
# custom_ort_package_versioned_name (e.g. Microsoft.ML.OnnxRuntime.Foundry.1.2.3.nupkg
# → ort package Microsoft.ML.OnnxRuntime.Foundry, GenAI package
# Microsoft.ML.OnnxRuntimeGenAI.Foundry).
#
# Each enabled RID maps to a core archive of a chosen EP flavor; disabled RIDs
# are passed empty placeholder dirs so the nuspec simply omits them.
# =============================================================================

parameters:
- name: custom_ort_package_versioned_name
  type: string
- name: nuget_version_type
  type: string
  default: 'stable'

# Per-RID enable + EP flavor (which core-<rid>-<ep>-archive to consume).
- name: enable_win_x64
  type: boolean
  default: false
- name: win_x64_ep
  type: string
  default: 'cuda'
- name: enable_win_arm64
  type: boolean
  default: false
- name: win_arm64_ep
  type: string
  default: 'cuda'
- name: enable_osx_arm64
  type: boolean
  default: false
- name: enable_linux_x64
  type: boolean
  default: false
- name: linux_x64_ep
  type: string
  default: 'cuda'
- name: enable_linux_arm64
  type: boolean
  default: false
- name: linux_arm64_ep
  type: string
  default: 'cpu'

jobs:
- job: foundry_nuget_packaging
  displayName: 'foundry · custom-ort nuget'
  pool:
    name: 'onnxruntime-Win-CPU-2022'
    os: windows
  timeoutInMinutes: 120
  workspace:
    clean: all

  variables:
  - name: downloadsDir
    value: '$(Build.BinariesDirectory)/artifact-downloads'
  - name: ridRoot
    value: '$(Build.BinariesDirectory)/rids'

  steps:
  - ${{ if eq(parameters.enable_win_x64, true) }}:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download core archive (win-x64 / ${{ parameters.win_x64_ep }})'
      inputs:
        artifactName: 'core-win-x64-${{ parameters.win_x64_ep }}-archive'
        targetPath: '$(downloadsDir)/win-x64'
  - ${{ if eq(parameters.enable_win_arm64, true) }}:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download core archive (win-arm64 / ${{ parameters.win_arm64_ep }})'
      inputs:
        artifactName: 'core-win-arm64-${{ parameters.win_arm64_ep }}-archive'
        targetPath: '$(downloadsDir)/win-arm64'
  - ${{ if eq(parameters.enable_osx_arm64, true) }}:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download core archive (osx-arm64 / cpu)'
      inputs:
        artifactName: 'core-osx-arm64-cpu-archive'
        targetPath: '$(downloadsDir)/osx-arm64'
  - ${{ if eq(parameters.enable_linux_x64, true) }}:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download core archive (linux-x64 / ${{ parameters.linux_x64_ep }})'
      inputs:
        artifactName: 'core-linux-x64-${{ parameters.linux_x64_ep }}-archive'
        targetPath: '$(downloadsDir)/linux-x64'
  - ${{ if eq(parameters.enable_linux_arm64, true) }}:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download core archive (linux-arm64 / ${{ parameters.linux_arm64_ep }})'
      inputs:
        artifactName: 'core-linux-arm64-${{ parameters.linux_arm64_ep }}-archive'
        targetPath: '$(downloadsDir)/linux-arm64'

  - checkout: self
    path: onnxruntime-genai
    clean: true
    submodules: recursive

  - template: steps/utils/set-genai-version.yml
    parameters:
      nuget_version_type: ${{ parameters.nuget_version_type }}

  # --- Extract each downloaded RID archive to a platform dir with lib/+include/
  - powershell: |
      $ErrorActionPreference = 'Stop'
      $rids = @('win-x64','win-arm64','osx-arm64','linux-x64','linux-arm64')
      New-Item -ItemType Directory -Force -Path '$(ridRoot)' | Out-Null
      foreach ($rid in $rids) {
        $dst = Join-Path '$(ridRoot)' $rid
        New-Item -ItemType Directory -Force -Path $dst | Out-Null   # placeholder (may stay empty)
        $src = Join-Path '$(downloadsDir)' $rid
        if (-not (Test-Path $src)) { Write-Host "RID $rid not enabled — empty placeholder"; continue }
        $archive = Get-ChildItem -Path $src -Include *.zip,*.tar.gz -File -Recurse | Select-Object -First 1
        if (-not $archive) { Write-Host "No archive for $rid"; continue }
        Write-Host "Extracting $($archive.FullName) → $dst"
        if ($archive.Name -like '*.zip') {
          Expand-Archive -Path $archive.FullName -DestinationPath $dst -Force
        } else {
          tar -xf $archive.FullName -C $dst
        }
        # CPACK_INCLUDE_TOPLEVEL_DIRECTORY nests everything under a <stem> dir;
        # the custom nuspec generator expects <platform_dir>/lib and /include, so
        # flatten the single top-level dir up into the platform dir.
        $top = Get-ChildItem -Path $dst -Directory | Where-Object { Test-Path (Join-Path $_.FullName 'lib') } | Select-Object -First 1
        if ($top) {
          Get-ChildItem -Path $top.FullName -Force | Move-Item -Destination $dst -Force
          Remove-Item -Path $top.FullName -Recurse -Force
        }
        Get-ChildItem -Path $dst -Recurse | Select-Object FullName
      }
    displayName: 'Extract core archives per-RID'

  - task: UsePythonVersion@0
    inputs:
      versionSpec: 3.11
      addToPath: true

  # --- Generate the custom nuspec (derives package name/version from the custom ORT nupkg)
  - powershell: |
      $ErrorActionPreference = 'Stop'
      $pattern = "Microsoft\.ML\.OnnxRuntime\.[\w-]+"
      $versioned_name = "${{ parameters.custom_ort_package_versioned_name }}"
      Write-Host "Custom ORT versioned name: $versioned_name"
      $match = [regex]::Match($versioned_name, $pattern)
      if (-not $match.Success) { Write-Error "Invalid ORT package name: $versioned_name"; exit 1 }
      $ort_nuget_package_name = $match.Value
      $suffix = $ort_nuget_package_name.Substring("Microsoft.ML.OnnxRuntime.".Length)
      $genai_nuget_package_name = "Microsoft.ML.OnnxRuntimeGenAI.$suffix"
      Write-Host "##vso[task.setvariable variable=genai_nuget_package_name;]$genai_nuget_package_name"
      $ort_package_version = $versioned_name.Substring($ort_nuget_package_name.Length + 1, $versioned_name.Length - $ort_nuget_package_name.Length - 1 - ".nupkg".Length)

      python.exe $(Build.Repository.LocalPath)\tools\nuget\generate_nuspec_for_custom_nuget.py `
        --package_name $genai_nuget_package_name `
        --package_version $(genai_version) `
        --ort_package_name $ort_nuget_package_name `
        --ort_package_version $ort_package_version `
        --root_dir $(Build.Repository.LocalPath) `
        --nuspec_path $(Build.Repository.LocalPath)/nuget/$genai_nuget_package_name.nuspec `
        --win_x64 '$(ridRoot)/win-x64' `
        --win_arm64 '$(ridRoot)/win-arm64' `
        --osx_arm64 '$(ridRoot)/osx-arm64' `
        --linux_x64 '$(ridRoot)/linux-x64' `
        --linux_arm64 '$(ridRoot)/linux-arm64' `
        --commit_id $(Build.SourceVersion)
      cat $(Build.Repository.LocalPath)\nuget\$genai_nuget_package_name.nuspec
      Write-Host "##vso[task.setvariable variable=nuspec_path;]$(Build.Repository.LocalPath)/nuget/$genai_nuget_package_name.nuspec"
    displayName: 'Generate custom (.Foundry) nuspec'

  - task: NuGetCommand@2
    displayName: 'Pack custom NuGet'
    inputs:
      command: 'pack'
      packagesToPack: '$(nuspec_path)'
      packDestination: '$(Build.ArtifactStagingDirectory)\nuget'

  # --- ESRP sign the custom NuGet -------------------------------------------
  - template: steps/compliant/esrp_nuget.yml
    parameters:
      DisplayName: 'ESRP - sign custom NuGet package'
      FolderPath: '$(Build.ArtifactStagingDirectory)\nuget'
      DoEsrp: 'true'

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish custom NuGet ($(genai_nuget_package_name))'
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)\nuget'
      artifactName: '$(genai_nuget_package_name)'
