# =============================================================================
# sdk-java-linux-step.yml — Linux Java SDK (desktop JVM jar) build step.
#
# Builds the desktop JVM jar *incrementally* against a prebuilt core:
#   1. Download the core CMake-package artifact for this cell.
#   2. Download ORT from Lotus (the standalone src/java cmake requires ORT_HOME).
#   3. build.py --sdk java --prebuilt_genai_home <core> --ort_home <ort>
#      (builds the JNI against the prebuilt core, then gradle assembles the jar
#      bundling the JNI + core .so). The core is NOT recompiled.
#   4. Assert the jar contains the native library.
#   5. Publish the jar artifact.
#
# Gradle resolves dependencies from the Lotus Maven feed via the
# ORG_GRADLE_PROJECT_lotusMavenUrl / _lotusMavenToken env vars (read by
# src/java/build.gradle as project properties).
# =============================================================================

parameters:
- name: arch
  type: string
  values: [x64, arm64]
- name: ep
  type: string
  values: [cpu, cuda]
- name: build_config
  type: string
  default: Release
- name: ort_version
  type: string
- name: core_artifact
  type: string

steps:

# --- Download prebuilt core CMake package -----------------------------------
- task: DownloadPipelineArtifact@2
  displayName: 'Download core CMake package (${{ parameters.core_artifact }})'
  inputs:
    artifactName: '${{ parameters.core_artifact }}'
    targetPath: '$(corePkgDir)'

# --- Download ORT from Lotus feed (authenticated) ---------------------------
- bash: |
    set -e
    if [ '${{ parameters.ep }}' = 'cuda' ]; then
      pkg_name='Microsoft.ML.OnnxRuntime.Gpu.Linux'
    else
      pkg_name='Microsoft.ML.OnnxRuntime'
    fi
    url="$(lotusOrtContentBase)/${pkg_name}/versions/${{ parameters.ort_version }}/content?api-version=6.0-preview.1"
    echo "Downloading $pkg_name ${{ parameters.ort_version }} from Lotus"
    mkdir -p ort_home/include ort_home/lib
    # No `set -x` in this step so the Bearer token is never echoed.
    curl --fail --retry 5 --retry-all-errors -L \
      -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
      -o ort.zip "$url"
    unzip -o ort.zip -d ort_extracted >/dev/null
    if [ '${{ parameters.ep }}' = 'cuda' ]; then
      hdr_src='ort_extracted/buildTransitive/native/include'
    else
      hdr_src='ort_extracted/build/native/include'
    fi
    if [ '${{ parameters.arch }}' = 'arm64' ]; then
      lib_platform='linux-arm64'
    else
      lib_platform='linux-x64'
    fi
    cp -r "${hdr_src}/"* ort_home/include/
    cp -r "ort_extracted/runtimes/${lib_platform}/native/"* ort_home/lib/
    echo "ORT layout:"; ls -la ort_home/include ort_home/lib
  displayName: 'Download ORT ${{ parameters.ort_version }} from Lotus feed'
  workingDirectory: '$(Build.SourcesDirectory)'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

# --- Resolve JAVA_HOME (arm64) ----------------------------------------------
# On the arm64 pool CMake's FindJNI can't locate the JDK headers via the
# update-alternatives /bin/java symlink, so it fails with "Could NOT find JNI".
# Resolve the real JDK home from javac and export JAVA_HOME so FindJNI picks up
# include/ (jni.h) + the JVM lib. (x64's default java is already a full JDK.)
- bash: |
    set -e
    javac_bin=$(command -v javac || true)
    if [ -z "$javac_bin" ]; then
      echo "ERROR: javac not found — a full JDK (not just a JRE) is required on this agent"; exit 1
    fi
    java_home=$(dirname "$(dirname "$(readlink -f "$javac_bin")")")
    echo "Resolved JAVA_HOME=$java_home"
    if [ ! -f "$java_home/include/jni.h" ]; then
      echo "ERROR: jni.h not found under $java_home/include (JDK dev headers missing)"; exit 1
    fi
    echo "##vso[task.setvariable variable=JAVA_HOME]$java_home"
  displayName: 'Resolve JAVA_HOME (arm64)'
  condition: eq('${{ parameters.arch }}', 'arm64')
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Build the desktop jar incrementally against the prebuilt core ----------
- bash: |
    set -e -x
    python3 build.py --sdk java \
      --config ${{ parameters.build_config }} \
      --parallel \
      --prebuilt_genai_home "$(corePkgDir)" \
      --ort_home "$(Build.SourcesDirectory)/ort_home" \
      --build_dir "$(jsdkBuildDir)"
  displayName: 'Build Java jar (incremental)'
  workingDirectory: '$(Build.SourcesDirectory)'
  env:
    # Gradle feed isolation: resolve deps + plugins from the Lotus Maven feed.
    # Read by src/java/build.gradle as project properties. Token is not echoed.
    ORG_GRADLE_PROJECT_lotusMavenUrl: '$(lotusMavenFeed)'
    ORG_GRADLE_PROJECT_lotusMavenToken: '$(System.AccessToken)'
    # Pin the jar/POM's onnxruntime Maven dependency to the same ORT the JNI was
    # built against (build.gradle reads this env var, else defaults to 1.23.0).
    ONNXRUNTIME_VERSION: '${{ parameters.ort_version }}'

# --- Assert the jar is produced and bundles the native library --------------
- bash: |
    set -e
    jar=$(find "$(Build.SourcesDirectory)/$(jsdkBuildDir)" -name "onnxruntime-genai*.jar" \
      ! -name "*sources*" ! -name "*javadoc*" | head -n1)
    if [ -z "$jar" ]; then echo "ASSERT FAIL: no jar produced"; exit 1; fi
    echo "Jar: $jar"
    listing=$(unzip -l "$jar")
    # The desktop jar must bundle BOTH the JNI shim and the core native library.
    if ! echo "$listing" | grep -Eq 'libonnxruntime-genai-jni\.so'; then
      echo "ASSERT FAIL: jar does not contain the JNI native library (libonnxruntime-genai-jni.so)"; exit 1
    fi
    if ! echo "$listing" | grep -Eq 'libonnxruntime-genai\.so'; then
      echo "ASSERT FAIL: jar does not contain the core native library (libonnxruntime-genai.so)"; exit 1
    fi
    echo "ASSERT OK: jar contains the JNI + core native libraries"
    # Stage the jar(s) to a stable path for publishing.
    mkdir -p "$(Build.SourcesDirectory)/jar_stage"
    find "$(Build.SourcesDirectory)/$(jsdkBuildDir)" -name "onnxruntime-genai*.jar" \
      -exec cp {} "$(Build.SourcesDirectory)/jar_stage/" \;
  displayName: 'Assert: jar produced + bundles native lib'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Publish jar -------------------------------------------------------------
- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish Java jar ($(artifactName))'
  inputs:
    artifactName: '$(artifactName)-jar'
    targetPath: '$(Build.SourcesDirectory)/jar_stage'
