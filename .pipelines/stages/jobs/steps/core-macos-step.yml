# =============================================================================
# core-macos-step.yml — macOS core build step template.
#
# Builds the onnxruntime-genai core natively on a macOS agent using build.py,
# installs the exported find_package package, runs CPack (tgz), Apple-signs the
# dylib, and publishes the two core artifacts. Mirrors core-linux-step.yml but
# runs directly on the mac host (no docker) and uses the macOS toolchain setup
# (rustup + brew llvm@18).
#
# macOS is CPU-only. Job-level variables (ortHome/coreInstall/buildDir/
# artifactName) come from core-build-job.yml.
# =============================================================================

parameters:
- name: arch
  type: string
  values: [arm64]
- name: ep
  type: string
  values: [cpu]
- name: build_config
  type: string
  default: Release
- name: ort_version
  type: string

steps:

# --- Rust + LLVM toolchain (guidance) -------------
- bash: |
    set -e
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    echo '##vso[task.prependpath]$HOME/.cargo/bin'
    source "$HOME/.cargo/env"
    rustup toolchain install 1.86.0
    rustup override set 1.86.0
    rustup target add aarch64-apple-darwin --toolchain 1.86.0
    rustc --version
  displayName: 'Install Rust toolchain'
  workingDirectory: '$(Build.SourcesDirectory)'

- bash: |
    set -e
    brew update --quiet
    brew install --quiet llvm@18
    LLVM_PREFIX="$(brew --prefix llvm@18)"
    echo "##vso[task.setvariable variable=LLVM_PREFIX]$LLVM_PREFIX"
    echo "##vso[task.prependpath]$LLVM_PREFIX/bin"
  displayName: 'Install LLVM 18'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Feed isolation: pip + cargo → Lotus ------------------------------------
- task: PipAuthenticate@1
  displayName: 'Authenticate pip to Lotus feed'
  inputs:
    artifactFeeds: '$(lotusFeedName)'
    onlyAddExtraIndex: false

- script: python3 -m pip install --user --break-system-packages requests wheel
  displayName: 'Install build-time Python deps'

- bash: |
    set -e
    mkdir -p "$(Build.SourcesDirectory)/.cargo"
    {
      echo '[source.crates-io]'
      echo 'replace-with = "lotus"'
      echo ''
      echo '[source.lotus]'
      echo 'registry = "$(lotusCargoSparse)"'
      echo ''
      echo '[registries.lotus]'
      echo 'index = "$(lotusCargoSparse)"'
      echo ''
      echo '[registry]'
      echo 'global-credential-providers = ["cargo:token"]'
    } > "$(Build.SourcesDirectory)/.cargo/config.toml"
  displayName: 'Configure cargo feed isolation (Lotus)'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Download ORT from Lotus feed (authenticated) ---------------------------
- bash: |
    set -e
    pkg_name='Microsoft.ML.OnnxRuntime'
    url="$(lotusOrtContentBase)/${pkg_name}/versions/${{ parameters.ort_version }}/content?api-version=6.0-preview.1"
    echo "Downloading $pkg_name ${{ parameters.ort_version }} from Lotus"
    mkdir -p ort_home/include ort_home/lib
    # No `set -x` — do not echo the token.
    curl --fail --retry 5 --retry-all-errors -L \
      -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
      -o ort.zip "$url"
    unzip -o ort.zip -d ort_extracted >/dev/null
    cp -r ort_extracted/build/native/include/* ort_home/include/
    cp -r ort_extracted/runtimes/osx-arm64/native/* ort_home/lib/
    ls -la ort_home/include ort_home/lib
  displayName: 'Download ORT ${{ parameters.ort_version }} from Lotus feed'
  workingDirectory: '$(Build.SourcesDirectory)'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

# --- Build core (build only) ------------------------------------------------
- bash: |
    set -e
    export MACOSX_DEPLOYMENT_TARGET=12.0
    export CC="$LLVM_PREFIX/bin/clang"
    export CXX="$LLVM_PREFIX/bin/clang++"
    export CARGO_BUILD_TARGET=aarch64-apple-darwin
    python3 build.py \
      --config ${{ parameters.build_config }} \
      --parallel \
      --skip_tests \
      --skip_examples \
      --skip_wheel \
      --use_guidance \
      --ort_home "$(Build.SourcesDirectory)/ort_home" \
      --cmake_extra_defines ENABLE_PYTHON=OFF ENABLE_TESTS=OFF CMAKE_OSX_ARCHITECTURES=arm64 Rust_CARGO_TARGET=aarch64-apple-darwin \
      --build_dir "$(buildDir)"
  displayName: 'Build core (build.py)'
  workingDirectory: '$(Build.SourcesDirectory)'
  env:
    CARGO_REGISTRIES_LOTUS_TOKEN: 'Bearer $(System.AccessToken)'

# --- ESRP Apple-sign the core dylib (before packaging) ----------------------
# ESRP MacAppDeveloperSign operates on a zip container (it signs the Mach-O
# binaries inside and repacks), so we zip the built dylib, sign the zip, then
# unzip the signed dylib back over the original. Signing BEFORE package+install
# means both the CPack archive AND the exported cmake-pkg (consumed by the mac
# Python wheel / Java jar) carry the signed dylib.
- bash: |
    set -e
    cmakeBuildDir="$(Build.SourcesDirectory)/$(buildDir)/${{ parameters.build_config }}"
    dylib=$(find "$cmakeBuildDir" -name 'libonnxruntime-genai.dylib' -type f | head -n1)
    [ -n "$dylib" ] || { echo "ERROR: built libonnxruntime-genai.dylib not found under $cmakeBuildDir"; exit 1; }
    dylib_dir=$(dirname "$dylib")
    echo "##vso[task.setvariable variable=macSignDylibDir]$dylib_dir"
    rm -rf "$(Build.SourcesDirectory)/mac_sign"; mkdir -p "$(Build.SourcesDirectory)/mac_sign"
    ( cd "$dylib_dir" && zip --symlinks "$(Build.SourcesDirectory)/mac_sign/genai_dylib.zip" 'libonnxruntime-genai.dylib' )
  displayName: 'Stage core dylib for signing'
  workingDirectory: '$(Build.SourcesDirectory)'

- template: compliant/mac-esrp-archive-step.yml
  parameters:
    FolderPath: '$(Build.SourcesDirectory)/mac_sign'
    Pattern: '*.zip'

- bash: |
    set -e
    ( cd "$(macSignDylibDir)" && unzip -o "$(Build.SourcesDirectory)/mac_sign/genai_dylib.zip" )
    echo "Restored signed dylib to $(macSignDylibDir)"
  displayName: 'Restore signed core dylib'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Package (CPack) + install (with the signed dylib) ----------------------
- bash: |
    set -e
    cmakeBuildDir="$(Build.SourcesDirectory)/$(buildDir)/${{ parameters.build_config }}"
    cmake --build "$cmakeBuildDir" --config ${{ parameters.build_config }} --target package
    cmake --install "$cmakeBuildDir" --config ${{ parameters.build_config }} --prefix "$(coreInstall)"
  displayName: 'Package + install core (signed)'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Assert: CMake package installed ----------------------------------------
- bash: |
    set -e
    req=(
      'lib/cmake/onnxruntime-genai/onnxruntime-genaiConfig.cmake'
      'lib/cmake/onnxruntime-genai/onnxruntime-genai-targets.cmake'
      'include/ort_genai_c.h'
      'include/ort_genai.h'
      'lib/libonnxruntime-genai.dylib'
    )
    for f in "${req[@]}"; do
      [ -f "$(coreInstall)/$f" ] || { echo "ASSERT FAIL: missing $f"; exit 1; }
    done
    echo "ASSERT OK: CMake package installed"
  displayName: 'Assert: CMake package installed'

# --- Assert: CPack archive produced + contains payload ----------------------
- bash: |
    set -e
    pkg_dir="$(buildDir)/${{ parameters.build_config }}/package"
    archive=$(find "$pkg_dir" -name '*.tar.gz' 2>/dev/null | head -n1)
    [ -n "$archive" ] || { echo "ASSERT FAIL: no CPack .tar.gz in $pkg_dir"; exit 1; }
    listing=$(tar -tzf "$archive")
    for pat in 'libonnxruntime-genai\.dylib' 'ort_genai_c\.h' 'ort_genai\.h'; do
      echo "$listing" | grep -Eq "$pat$" || { echo "ASSERT FAIL: archive missing /$pat/"; exit 1; }
    done
    echo "ASSERT OK: archive contains native lib + public headers"
  displayName: 'Assert: CPack archive contents'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Rename archive to embed the computed package version -------------------
# CPack names the archive with the base VERSION_INFO (e.g. 0.15.0-dev). Replace
# that with the pipeline-computed genai_version so the published C/C++ archive
# matches the NuGet/package version. For stable builds this is a no-op.
- bash: |
    set -e
    pkg_dir="$(buildDir)/${{ parameters.build_config }}/package"
    ver_info=$(tr -d '[:space:]' < VERSION_INFO)
    genai_ver='$(genai_version)'
    for f in "$pkg_dir"/onnxruntime-genai-*.tar.gz; do
      [ -e "$f" ] || continue
      base=$(basename "$f")
      newbase="${base/$ver_info/$genai_ver}"
      if [ "$base" != "$newbase" ]; then
        echo "Renaming $base -> $newbase"
        mv "$f" "$pkg_dir/$newbase"
      fi
    done
  displayName: 'Rename archive with computed version'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Publish artifacts -------------------------------------------------------
- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish core CMake package ($(artifactName))'
  inputs:
    artifactName: '$(artifactName)-cmake-pkg'
    targetPath: '$(coreInstall)'

- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish core archive ($(artifactName))'
  inputs:
    artifactName: '$(artifactName)-archive'
    targetPath: '$(Build.SourcesDirectory)/$(buildDir)/${{ parameters.build_config }}/package'
