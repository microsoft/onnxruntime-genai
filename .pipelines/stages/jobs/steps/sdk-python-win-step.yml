# =============================================================================
# sdk-python-win-step.yml — Windows Python SDK (wheel) build step (Phase 3).
#
# Builds the Python wheel *incrementally* against a prebuilt core:
#   1. Download the core CMake-package artifact for this cell.
#   2. Download ORT from Lotus (headers + import lib the extension links against).
#   3. build.py --sdk python --prebuilt_genai_home <core> --ort_home <ort>.
#   4. Smoke-assert the wheel imports (CPU) or is named correctly (CUDA).
#   5. Publish the wheel artifact.
#
# The core is NOT recompiled — only the pybind extension + wheel are built.
#
# Job-level variables expected from the parent job:
#   corePkgDir    - dir the core cmake-pkg artifact is downloaded into
#   ortHome       - dir ORT headers+libs are unpacked into
#   pysdkBuildDir - build.py --build_dir for the SDK (e.g. build/pysdk)
#   artifactName  - artifact name prefix (e.g. python-win-x64-cpu)
# =============================================================================

parameters:
- name: arch
  type: string
  values: [x64, arm64]
- name: ep
  type: string
  values: [cpu, cuda]
- name: build_config
  type: string
  default: Release
- name: ort_version
  type: string
- name: core_artifact
  type: string

steps:

# --- Python -----------------------------------------------------------------
- script: |
    MKDIR "$(Agent.ToolsDirectory)\Python\3.11.0\arm64"
    XCOPY /s /y /h /e /c /q "C:\Python\Python311\*.*" "$(Agent.ToolsDirectory)\Python\3.11.0\arm64\"
    COPY NUL "$(Agent.ToolsDirectory)\Python\3.11.0\arm64.complete"
  displayName: 'Install Python 3.11 (arm64 agent)'
  condition: eq('${{ parameters.arch }}', 'arm64')

- task: UsePythonVersion@0
  displayName: 'Use Python 3.11 (${{ parameters.arch }})'
  condition: ne('${{ parameters.arch }}', 'arm64')
  inputs:
    versionSpec: '3.11'
    addToPath: true
    architecture: '${{ parameters.arch }}'

# --- Feed isolation: pip → Lotus (authenticated) ----------------------------
- task: PipAuthenticate@1
  displayName: 'Authenticate pip to Lotus feed'
  inputs:
    artifactFeeds: '$(lotusFeedName)'
    onlyAddExtraIndex: false

- script: python -m pip install pybind11 wheel requests
  displayName: 'Install build-time Python deps'

# --- Download prebuilt core CMake package -----------------------------------
- task: DownloadPipelineArtifact@2
  displayName: 'Download core CMake package (${{ parameters.core_artifact }})'
  inputs:
    artifactName: '${{ parameters.core_artifact }}'
    targetPath: '$(corePkgDir)'

# --- Download ORT from Lotus feed (authenticated) ---------------------------
- powershell: |
    $ErrorActionPreference = 'Stop'
    if ('${{ parameters.ep }}' -eq 'cuda' -and '${{ parameters.arch }}' -ne 'arm64') {
      $pkgName = 'Microsoft.ML.OnnxRuntime.Gpu.Windows'
    } else {
      $pkgName = 'Microsoft.ML.OnnxRuntime'
    }
    $url = "$(lotusOrtContentBase)/$pkgName/versions/${{ parameters.ort_version }}/content?api-version=6.0-preview.1"
    Write-Host "Downloading $pkgName ${{ parameters.ort_version }} from Lotus"
    $zip = "$(Agent.TempDirectory)\ort.zip"
    Invoke-WebRequest -Uri $url -OutFile $zip -ErrorAction Stop `
      -Headers @{ Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN" }
    Expand-Archive -Path $zip -DestinationPath "$(Agent.TempDirectory)\ort_extracted" -Force
    New-Item -ItemType Directory -Force -Path "$(ortHome)\include","$(ortHome)\lib" | Out-Null
    if ('${{ parameters.ep }}' -eq 'cuda' -and '${{ parameters.arch }}' -ne 'arm64') {
      $hdrSrc = 'buildTransitive\native\include'
    } else {
      $hdrSrc = 'build\native\include'
    }
    $platform = 'win-${{ parameters.arch }}'
    Copy-Item "$(Agent.TempDirectory)\ort_extracted\$hdrSrc\*" "$(ortHome)\include\" -Recurse -Force
    Copy-Item "$(Agent.TempDirectory)\ort_extracted\runtimes\$platform\native\*" "$(ortHome)\lib\" -Recurse -Force
  displayName: 'Download ORT ${{ parameters.ort_version }} from Lotus feed'
  workingDirectory: '$(Build.SourcesDirectory)'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

# --- Build the wheel incrementally against the prebuilt core ----------------
# ONNXRUNTIME_VERSION pins the wheel's runtime onnxruntime dependency to the same
# ORT the extension was built against (see src/python/setup.py.in).
- powershell: |
    $ErrorActionPreference = 'Stop'
    $args = @(
      'build.py',
      '--sdk', 'python',
      '--config', '${{ parameters.build_config }}',
      '--parallel',
      '--prebuilt_genai_home', '$(corePkgDir)',
      '--ort_home', '$(ortHome)',
      '--build_dir', '$(pysdkBuildDir)'
    )
    if ('${{ parameters.arch }}' -eq 'arm64') { $args += '--arm64' }
    Write-Host "Running: python $($args -join ' ')"
    & python @args
    if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
  displayName: 'Build Python wheel (incremental)'
  workingDirectory: '$(Build.SourcesDirectory)'
  env:
    ONNXRUNTIME_VERSION: '${{ parameters.ort_version }}'

# --- Assert the wheel is produced (+ imports on CPU) ------------------------
- powershell: |
    $ErrorActionPreference = 'Stop'
    $whl = Get-ChildItem -Recurse "$(Build.SourcesDirectory)\$(pysdkBuildDir)" -Filter *.whl |
      Select-Object -First 1
    if (-not $whl) { Write-Error "ASSERT FAIL: no wheel produced"; exit 1 }
    Write-Host "Wheel: $($whl.FullName)"
    if ('${{ parameters.ep }}' -eq 'cuda') {
      # A CUDA wheel cannot be import-tested on a CPU agent (loads cuda provider);
      # assert the flavor is baked into the wheel name instead.
      if ($whl.Name -notmatch 'cuda') {
        Write-Error "ASSERT FAIL: CUDA wheel name missing 'cuda': $($whl.Name)"; exit 1
      }
      Write-Host "ASSERT OK: CUDA wheel produced ($($whl.Name))"
    } else {
      python -m pip install onnxruntime
      python -m pip install --force-reinstall --no-deps $whl.FullName
      $expected = (Get-Content "$(Build.SourcesDirectory)\VERSION_INFO" -Raw).Trim()
      $actual = (python -c "import onnxruntime_genai as og; print(og.__version__)").Trim()
      Write-Host "expected=$expected actual=$actual"
      if ($actual -ne $expected) { Write-Error "ASSERT FAIL: wheel version mismatch"; exit 1 }
      Write-Host "ASSERT OK: wheel imports and reports $actual"
    }
    # Stage the wheel to a stable path so publishing does not depend on the
    # exact build-dir nesting (build.py places it under <build_dir>/python/<config>/wheel).
    $stage = "$(Build.ArtifactStagingDirectory)\wheel"
    New-Item -ItemType Directory -Force -Path $stage | Out-Null
    Copy-Item $whl.FullName $stage -Force
  displayName: 'Assert: wheel produced + imports'

# --- Publish wheel -----------------------------------------------------------
- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish Python wheel ($(artifactName))'
  inputs:
    artifactName: '$(artifactName)-wheel'
    targetPath: '$(Build.ArtifactStagingDirectory)\wheel'
