# Shared Stage 1 publish: turns the exported core (build/$(ep)/install) into the
# C/C++ SDK archive AND publishes the raw export as the canonical "core" artifact
# that every Stage 2 SDK job consumes via build.py --prebuilt_genai_home.
parameters:
- name: archiveType
  type: string
  default: 'tar'        # 'tar' (Linux/macOS) or 'zip' (Windows)
- name: macSign
  type: boolean
  default: false

steps:
- task: CopyFiles@2
  displayName: 'Add license/notices to C/C++ SDK'
  inputs:
    SourceFolder: '$(Build.Repository.LocalPath)'
    Contents: |
      VERSION_INFO
      LICENSE
      SECURITY.md
      README.md
      ThirdPartyNotices.txt
    TargetFolder: '$(Build.Repository.LocalPath)/$(coreInstallDir)'

- ${{ if ne(parameters.macSign, true) }}:
  - task: ArchiveFiles@2
    displayName: 'Archive C/C++ SDK'
    inputs:
      rootFolderOrFile: '$(Build.Repository.LocalPath)/$(coreInstallDir)'
      includeRootFolder: true
      archiveType: ${{ parameters.archiveType }}
      ${{ if eq(parameters.archiveType, 'tar') }}:
        tarCompression: 'gz'
        archiveFile: '$(Build.ArtifactStagingDirectory)/capi/$(artifactName).tar.gz'
      ${{ else }}:
        archiveFile: '$(Build.ArtifactStagingDirectory)/capi/$(artifactName).zip'
      replaceExistingArchive: true

- ${{ if eq(parameters.macSign, true) }}:
  # ESRP MacAppDeveloperSign only accepts .zip/.dmg, so we sign an intermediate .zip
  # (created with `zip -FSr --symlinks` to preserve macOS dylib version symlinks), then
  # repack the signed tree into the canonical .tar.gz that Linux/downstream expect.
  - bash: |
      set -e -x
      mkdir -p "$(Build.ArtifactStagingDirectory)/capi"
      cd "$(Build.Repository.LocalPath)/build/$(ep)"
      zip -FSr --symlinks "$(Build.ArtifactStagingDirectory)/capi/$(artifactName).zip" "$(artifactName)"
    displayName: 'Zip C/C++ SDK for signing'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - template: compliant/mac-esrp-archive-step.yml
    parameters:
      FolderPath: '$(Build.ArtifactStagingDirectory)/capi'
      Pattern: '*.zip'

  - bash: |
      set -e -x
      cd "$(Build.ArtifactStagingDirectory)/capi"
      rm -rf _signed && mkdir _signed
      unzip -q "$(artifactName).zip" -d _signed
      tar -czf "$(artifactName).tar.gz" -C _signed "$(artifactName)"
      rm -rf _signed "$(artifactName).zip"
    displayName: 'Repack signed C/C++ SDK to .tar.gz'
    workingDirectory: '$(Build.Repository.LocalPath)'

- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish Artifact: C/C++ SDK'
  inputs:
    artifactName: $(artifactName)-capi
    targetPath: '$(Build.ArtifactStagingDirectory)/capi'

# The exported CMake package (imported target onnxruntime-genai::onnxruntime-genai)
# is the single core artifact reused by all SDK jobs — never rebuilt downstream.
- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish Artifact: core export'
  inputs:
    artifactName: $(artifactName)-core
    targetPath: '$(Build.Repository.LocalPath)/$(coreInstallDir)'
