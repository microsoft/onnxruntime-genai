# =============================================================================
# core-linux-step.yml — Linux core build step template (Phase 1).
#
# Pulls the appropriate manylinux Docker image from ACR, downloads ORT from
# the Lotus NuGet feed, then runs all build steps inside the container:
#   build.py (configure + build + CPack + cmake --install)
# Asserts the expected artifacts and publishes:
#   $(artifactName)-cmake-pkg  — CMake package (SDK handoff)
#   $(artifactName)-archive    — CPack .tar.gz (distribution)
#
# Job-level variables expected from the parent job:
#   artifactName  - artifact name prefix (e.g. core-linux-x64-cpu)
# Internal paths are derived from $(Build.SourcesDirectory) and hardcoded
# docker paths (/ort_genai_src/...).
# =============================================================================

parameters:
- name: arch
  type: string
  values: [x64, arm64]
- name: ep
  type: string
  values: [cpu, cuda]
- name: build_config
  type: string
  default: Release
- name: ort_version
  type: string
- name: cuda_version
  type: string
  default: ''

steps:

- task: Docker@2
  displayName: 'Login to build cache ACR'
  inputs:
    containerRegistry: 'onnxruntimebuildcache'
    command: 'login'
    addPipelineData: false

# --- Pull manylinux Docker image --------------------------------------------
- bash: |
    set -e -x
    python3 -m pip install requests
    if [ '${{ parameters.ep }}' = 'cuda' ]; then
      cudaDockerVer='${{ parameters.cuda_version }}'
      if [[ '${{ parameters.cuda_version }}' == 13.* ]]; then
        cudaDockerVer='13'
      fi
      dockerfile="tools/ci_build/github/linux/docker/manylinux/Dockerfile.manylinux2_28_cuda_${cudaDockerVer}"
    else
      if [ '${{ parameters.arch }}' = 'arm64' ]; then
        dockerfile='tools/ci_build/github/linux/docker/manylinux/Dockerfile.manylinux2_28_cpu_aarch64'
      else
        dockerfile='tools/ci_build/github/linux/docker/manylinux/Dockerfile.manylinux2_28_cpu'
      fi
    fi
    python3 tools/ci_build/get_docker_image.py \
      --dockerfile "$dockerfile" \
      --context tools/ci_build/github/linux/docker/manylinux \
      --docker-build-args "--build-arg BUILD_UID=$(id -u)" \
      --container-registry onnxruntimebuildcache.azurecr.io \
      --repository "ortgenai${{ parameters.ep }}build${{ parameters.arch }}"
  displayName: 'Pull manylinux Docker image (${{ parameters.ep }}, ${{ parameters.arch }})'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Download ORT from Lotus NuGet feed -------------------------------------
- bash: |
    set -e -x
    # CUDA Linux uses the GPU ORT package; CPU uses the CPU package.
    if [ '${{ parameters.ep }}' = 'cuda' ]; then
      pkg_name='Microsoft.ML.OnnxRuntime.Gpu.Linux'
    else
      pkg_name='Microsoft.ML.OnnxRuntime'
    fi
    org='aiinfra'
    proj='2692857e-05ef-43b4-ba9c-ccf1c22c437c'
    feed='7982ae20-ed19-4a35-a362-a96ac99897b7'
    url="https://pkgs.dev.azure.com/${org}/${proj}/_apis/packaging/feeds/${feed}/nuget/packages/${pkg_name}/versions/${{ parameters.ort_version }}/content?api-version=6.0-preview.1"
    echo "Downloading $pkg_name ${{ parameters.ort_version }} from Lotus"
    mkdir -p ort_home/include ort_home/lib
    curl --fail --retry 5 --retry-all-errors -L -o ort.zip "$url"
    unzip -o ort.zip -d ort_extracted >/dev/null
    # CUDA headers are under buildTransitive; CPU under build
    if [ '${{ parameters.ep }}' = 'cuda' ]; then
      hdr_src='ort_extracted/buildTransitive/native/include'
    else
      hdr_src='ort_extracted/build/native/include'
    fi
    if [ '${{ parameters.arch }}' = 'arm64' ]; then
      lib_platform='linux-arm64'
    else
      lib_platform='linux-x64'
    fi
    cp -r "${hdr_src}/"* ort_home/include/
    cp -r "ort_extracted/runtimes/${lib_platform}/native/"* ort_home/lib/
    echo "ORT layout:"; ls -la ort_home/include ort_home/lib
  displayName: 'Download ORT ${{ parameters.ort_version }} from Lotus feed'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Build core + CPack archive + install CMake package (inside docker) -----
- bash: |
    set -e -x
    docker_image="ortgenai${{ parameters.ep }}build${{ parameters.arch }}"
    docker_args=(
      --rm
      --volume "$(Build.SourcesDirectory):/ort_genai_src"
      -w /ort_genai_src
    )
    if [ '${{ parameters.ep }}' = 'cuda' ]; then
      if [[ '${{ parameters.cuda_version }}' == 13.* ]]; then
        cuda_archs='75-real;80-real;86-real;89-real;90-real;100-real;120-real;120-virtual'
      else
        cuda_archs='60-real;70-real;75-real;80-real;86-real;89-real;90-real;100-real;120'
      fi
      docker_args+=(-e "CUDA_EXTRA_ARGS=--use_cuda --cmake_extra_defines CMAKE_CUDA_ARCHITECTURES=${cuda_archs}")
    fi
    docker run "${docker_args[@]}" "$docker_image" bash -c '
      set -e -x
      PY=/opt/python/cp311-cp311/bin/python3.11
      $PY -m pip install requests wheel

      extra_cuda_args=()
      if [ -n "$CUDA_EXTRA_ARGS" ]; then
        read -ra extra_cuda_args <<< "$CUDA_EXTRA_ARGS"
      fi

      $PY build.py \
        --config ${{ parameters.build_config }} \
        --parallel \
        --skip_tests \
        --skip_examples \
        --skip_wheel \
        --use_guidance \
        --ort_home /ort_genai_src/ort_home \
        --cmake_extra_defines ENABLE_PYTHON=OFF ENABLE_TESTS=OFF \
        --build_dir build/core \
        --install_dir /ort_genai_src/install \
        --package \
        "${extra_cuda_args[@]}"
    '
  displayName: 'Build core (build.py, inside docker)'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Assert: CMake package installed ----------------------------------------
- bash: |
    set -e
    req=(
      'install/lib/cmake/onnxruntime-genai/onnxruntime-genaiConfig.cmake'
      'install/lib/cmake/onnxruntime-genai/onnxruntime-genaiConfigVersion.cmake'
      'install/lib/cmake/onnxruntime-genai/onnxruntime-genai-targets.cmake'
      'install/include/ort_genai_c.h'
      'install/include/ort_genai.h'
      'install/lib/libonnxruntime-genai.so'
    )
    for f in "${req[@]}"; do
      [ -f "$f" ] || { echo "ASSERT FAIL: missing $f"; exit 1; }
    done
    echo "ASSERT OK: CMake package installed at $(Build.SourcesDirectory)/install"
  displayName: 'Assert: CMake package installed'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Assert: CPack archive produced -----------------------------------------
- bash: |
    set -e
    pkg_dir='build/core/${{ parameters.build_config }}/package'
    archives=$(find "$pkg_dir" -name '*.tar.gz' 2>/dev/null | head -n1)
    if [ -z "$archives" ]; then
      echo "ASSERT FAIL: no CPack .tar.gz found in $pkg_dir"; exit 1
    fi
    echo "ASSERT OK: CPack archive: $archives"
  displayName: 'Assert: CPack archive produced'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Publish artifacts -------------------------------------------------------
- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish core CMake package ($(artifactName))'
  inputs:
    artifactName: '$(artifactName)-cmake-pkg'
    targetPath: '$(Build.SourcesDirectory)/install'

- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish core archive ($(artifactName))'
  inputs:
    artifactName: '$(artifactName)-archive'
    targetPath: '$(Build.SourcesDirectory)/build/core/${{ parameters.build_config }}/package'
