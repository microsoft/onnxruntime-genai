parameters:
- name: target
  type: string
- name: ep
  type: string
  default: 'cpu'
- name: arch
  type: string
  default: 'x64'
- name: build_config
  type: string
  default: 'release'
- name: ort_build_version
  type: string
  default: 'default'
- name: ort_build_source
  type: string
  default: 'NuGet'
# When true, build the wheel incrementally against the prebuilt '-core' artifact.
# When false, build the core and the pybind extension together in one build.py pass.
- name: prebuilt_core
  type: boolean
  default: false

steps:

- checkout: self
  clean: true
  path: onnxruntime-genai
  submodules: recursive

- template: utils/set-nightly-build-option-variable.yml

- bash: |
    echo "arch=$(arch)"
    echo "ort_version=$(ort_version)"
    echo "ep=$(ep)"
    echo "cuda_version=$(cuda_version)"
    echo "target=${{ parameters.target }}"
    echo "build_config=${{ parameters.build_config }}"
  displayName: 'Print Parameters'

- bash: |
    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    echo '##vso[task.prependpath]$HOME/.cargo/bin'
    source "$HOME/.cargo/env"
    rustup toolchain install 1.86.0
    rustup override set 1.86.0
    if [ "$(arch)" = "arm64" ]; then
      rustup target add aarch64-apple-darwin --toolchain 1.86.0
    fi
    rustc --version
    rustup show active-toolchain
  displayName: 'Install Rust Toolchain'
  workingDirectory: '$(Build.Repository.LocalPath)'

- bash: |
    brew update --quiet
    brew install --quiet llvm@18
    LLVM_PREFIX="$(brew --prefix llvm@18)"
    echo "##vso[task.setvariable variable=LLVM_PREFIX]$LLVM_PREFIX"
    echo "##vso[task.prependpath]$LLVM_PREFIX/bin"
  displayName: 'Install LLVM'
  workingDirectory: '$(Build.Repository.LocalPath)'

- ${{ if ne(parameters.ort_build_version, 'default') }}:
  - bash: |
      set -e -x
      # macOS only supports CPU
      package_name="Microsoft.ML.OnnxRuntime"

      org_name="aiinfra"
      feed_project="2692857e-05ef-43b4-ba9c-ccf1c22c437c"
      feed_id="7982ae20-ed19-4a35-a362-a96ac99897b7"
      version="${{ parameters.ort_build_version }}"

      source="${{ parameters.ort_build_source }}"
      if [ "$source" = "Ort-Nightly" ]; then
          url="https://pkgs.dev.azure.com/${org_name}/${feed_project}/_apis/packaging/feeds/${feed_id}/nuget/packages/${package_name}/versions/${version}/content?api-version=6.0-preview.1"
      else
          url="https://www.nuget.org/api/v2/package/${package_name}/${version}"
      fi

      echo "Downloading $package_name version $version"
      download_path="$(Agent.TempDirectory)/ort_build_pkg.zip"
      curl --fail --retry 5 --retry-all-errors -L -o "$download_path" "$url"

      if [ ! -s "$download_path" ]; then
          echo "Error: Downloaded ORT package is missing or empty at $download_path"
          exit 1
      fi

      extract_path="$(Agent.TempDirectory)/ort_build_extracted"
      mkdir -p "$extract_path"
      unzip -o "$download_path" -d "$extract_path"

      ort_home="$(Build.Repository.LocalPath)/ort_build"
      mkdir -p "$ort_home/include"
      mkdir -p "$ort_home/lib"

      # Copy headers
      cp -r "$extract_path/build/native/include/"* "$ort_home/include/"

      # Copy libraries
      if [ "$(arch)" = "arm64" ]; then
          platform="osx-arm64"
      else
          platform="osx-x64"
      fi
      cp -r "$extract_path/runtimes/$platform/native/"* "$ort_home/lib/"

      echo "ORT_HOME: $ort_home"
      ls -la "$ort_home/include/"
      ls -la "$ort_home/lib/"
      echo "##vso[task.setvariable variable=ORT_HOME_CMAKE_ARG]-DORT_HOME=$(Build.Repository.LocalPath)/ort_build"
    displayName: 'Download ORT build package ${{ parameters.ort_build_version }}'
    workingDirectory: '$(Build.Repository.LocalPath)'

- ${{ if eq(parameters.target, 'onnxruntime-genai') }}:
  - powershell: |
      $ErrorActionPreference = "Stop"
      # Map the pipeline's lowercase build config to build.py's capitalized --config.
      # build.py appends the config to --build_dir, so CPack writes the C/C++ API
      # archive under build/<ep>/<Config>/package.
      $cfg = switch ("$(build_config)") {
        "release"        { "Release" }
        "relwithdebinfo" { "RelWithDebInfo" }
        "debug"          { "Debug" }
        default          { "Release" }
      }

      $env:MACOSX_DEPLOYMENT_TARGET = "12.0" # Monterey
      $env:CC = "$env:LLVM_PREFIX/bin/clang"
      $env:CXX = "$env:LLVM_PREFIX/bin/clang++"
      # llguidance's rust staticlib is linked with dynamic_lookup so undefined
      # symbols resolve against the host at load time (matches the old preset path).
      $env:RUSTFLAGS = "-C link-arg=-undefined -C link-arg=dynamic_lookup"

      $extraDefines = @("ENABLE_PYTHON=OFF", "ENABLE_TESTS=OFF", "CMAKE_OSX_ARCHITECTURES=$(arch)")
      if ("$(arch)" -eq "arm64") {
        $env:CARGO_BUILD_TARGET = "aarch64-apple-darwin"
        $env:CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER = $env:CC
        $env:CC_aarch64_apple_darwin = $env:CC
        $env:CXX_aarch64_apple_darwin = $env:CXX
        $extraDefines += "Rust_CARGO_TARGET=aarch64-apple-darwin"
      }

      $buildArgs = @(
        "--config", $cfg,
        "--parallel",
        "--skip_tests",
        "--skip_examples",
        "--skip_wheel",
        "--use_guidance",
        "--package",
        "--install_dir", "$(Build.Repository.LocalPath)/build/$(ep)/coreexport/prefix",
        "--build_dir", "$(Build.Repository.LocalPath)/build/$(ep)"
      )
      # Reuse the ORT_HOME the download step resolved (empty for the fetch-from-source path).
      $ortArg = "$(ORT_HOME_CMAKE_ARG)"
      if ($ortArg -match '^-DORT_HOME=(.*)$') { $buildArgs += @("--ort_home", $Matches[1]) }
      $buildArgs += @("--cmake_extra_defines") + $extraDefines

      python -m pip install --quiet requests
      Write-Host "python build.py $buildArgs"
      python build.py @buildArgs

      $pkgDir = "$(Build.Repository.LocalPath)/build/$(ep)/$cfg/package"
      Write-Host "##vso[task.setvariable variable=capiPackageDir;]$pkgDir"
    displayName: 'Build GenAI core (build.py)'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - bash: |
      set -e -x
      ls -al "$(capiPackageDir)"
      tar -xvzf onnxruntime-genai-*.tar.gz -C .
      find . -maxdepth 1 -type d -name 'onnxruntime-genai-*' -exec zip -FSr --symlinks {}.zip {} \;
      rm -rf "$(capiPackageDir)"/onnxruntime-genai-*.tar.gz
      find "$(capiPackageDir)" -maxdepth 1 -type d -name 'onnxruntime-genai-*' -exec rm -rf {} +
      ls -al "$(capiPackageDir)"
    displayName: 'Convert from .tar.gz to .zip'
    workingDirectory: '$(capiPackageDir)'

  - template: compliant/mac-esrp-archive-step.yml
    parameters:
      FolderPath: '$(capiPackageDir)'
      Pattern: '*.zip'

  - bash: |
      set -e -x
      ls -al "$(capiPackageDir)"
      find . -name 'onnxruntime-genai-*.zip' -exec unzip {} \;
      find . -maxdepth 1 -type d -name 'onnxruntime-genai-*' -exec tar -czvf {}.tar.gz {} \;
      rm -rf "$(capiPackageDir)"/onnxruntime-genai-*.zip
      find "$(capiPackageDir)" -maxdepth 1 -type d -name 'onnxruntime-genai-*' -exec rm -rf {} +
      ls -al "$(capiPackageDir)"
    displayName: 'Convert from .zip to .tar.gz'
    workingDirectory: '$(capiPackageDir)'

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish Artifact: ONNXRuntime Genai capi'
    inputs:
      artifactName: $(artifactName)-capi
      targetPath: '$(capiPackageDir)'

  - bash: |
      set -e -x
      # Assemble an ONNX Runtime home (headers + dylibs) next to the exported core so
      # the incremental Python/Java SDK builds compile the binding against the same
      # ONNX Runtime this core was built with (single ORT source).
      cfg=$(echo "$(build_config)" | sed -E 's/^release$/Release/;s/^relwithdebinfo$/RelWithDebInfo/;s/^debug$/Debug/')
      base="$(Build.Repository.LocalPath)/build/$(ep)"
      ort_out="$base/coreexport/ort"
      mkdir -p "$ort_out/include" "$ort_out/lib"
      if [ -d "$(Build.Repository.LocalPath)/ort_build/lib" ]; then
        cp -a "$(Build.Repository.LocalPath)/ort_build/include/." "$ort_out/include/"
        cp -a "$(Build.Repository.LocalPath)/ort_build/lib/." "$ort_out/lib/"
      else
        ortsrc="$base/$cfg/_deps/ortlib-src"
        if [ -d "$ortsrc/build/native/include" ]; then
          cp -a "$ortsrc"/build/native/include/. "$ort_out/include/"
        else
          cp -a "$ortsrc"/buildTransitive/native/include/. "$ort_out/include/"
        fi
        rid=osx-arm64
        [ "$(arch)" = "x64" ] && rid=osx-x64
        cp -a "$ortsrc"/runtimes/"$rid"/native/. "$ort_out/lib/"
      fi
      ls -la "$ort_out/include" "$ort_out/lib"
    displayName: 'Assemble core export (ORT home)'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish Artifact: ONNXRuntime GenAI core export'
    inputs:
      artifactName: $(artifactName)-core
      targetPath: '$(Build.Repository.LocalPath)/build/$(ep)/coreexport'

- ${{ if eq(parameters.target, 'python') }}:
  - ${{ if eq(parameters.prebuilt_core, true) }}:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download prebuilt core (incremental)'
      inputs:
        artifact: $(artifactName)-core
        targetPath: '$(Build.Repository.LocalPath)/coreexport'

  - powershell: |
      python -m pip install --quiet requests pybind11 wheel build
    displayName: 'Install wheel build tools'

  - ${{ if eq(parameters.prebuilt_core, true) }}:
    - powershell: |
        $ErrorActionPreference = "Stop"
        $cfg = switch ("$(build_config)") {
          "release"        { "Release" }
          "relwithdebinfo" { "RelWithDebInfo" }
          "debug"          { "Debug" }
          default          { "Release" }
        }
        $env:MACOSX_DEPLOYMENT_TARGET = "12.0"
        $env:CC = "$env:LLVM_PREFIX/bin/clang"
        $env:CXX = "$env:LLVM_PREFIX/bin/clang++"
        if ("$(arch)" -eq "arm64") {
            $env:_PYTHON_HOST_PLATFORM = "macosx-12.0-arm64"
            $env:ARCHFLAGS = "-arch arm64"
        } else {
            $env:_PYTHON_HOST_PLATFORM = "macosx-12.0-x86_64"
            $env:ARCHFLAGS = "-arch x86_64"
        }
        # Incremental wheel: compile only the pybind extension against the prebuilt
        # core (coreexport/{prefix,ort}); the core dylib is bundled, not rebuilt.
        $buildArgs = @(
          "--config", $cfg,
          "--parallel",
          "--sdk", "python",
          "--prebuilt_genai_home", "$(Build.Repository.LocalPath)/coreexport/prefix",
          "--ort_home", "$(Build.Repository.LocalPath)/coreexport/ort",
          "--build_dir", "$(Build.Repository.LocalPath)/build/$(ep)",
          "--cmake_extra_defines", "CMAKE_OSX_ARCHITECTURES=$(arch)"
        )
        Write-Host "python build.py $buildArgs"
        python build.py @buildArgs
      displayName: 'Build Python wheel $(PyNoDotVer) (prebuilt core)'
      workingDirectory: '$(Build.Repository.LocalPath)'

  - ${{ if ne(parameters.prebuilt_core, true) }}:
    - powershell: |
        $ErrorActionPreference = "Stop"
        $cfg = switch ("$(build_config)") {
          "release"        { "Release" }
          "relwithdebinfo" { "RelWithDebInfo" }
          "debug"          { "Debug" }
          default          { "Release" }
        }
        $env:MACOSX_DEPLOYMENT_TARGET = "12.0"
        $env:CC = "$env:LLVM_PREFIX/bin/clang"
        $env:CXX = "$env:LLVM_PREFIX/bin/clang++"
        $env:RUSTFLAGS = "-C link-arg=-undefined -C link-arg=dynamic_lookup"
        $extraDefines = @("ENABLE_TESTS=OFF", "CMAKE_OSX_ARCHITECTURES=$(arch)")
        if ("$(arch)" -eq "arm64") {
            $env:_PYTHON_HOST_PLATFORM = "macosx-12.0-arm64"
            $env:ARCHFLAGS = "-arch arm64"
            $env:CARGO_BUILD_TARGET = "aarch64-apple-darwin"
            $env:CARGO_TARGET_AARCH64_APPLE_DARWIN_LINKER = $env:CC
            $env:CC_aarch64_apple_darwin = $env:CC
            $env:CXX_aarch64_apple_darwin = $env:CXX
            $extraDefines += "Rust_CARGO_TARGET=aarch64-apple-darwin"
        } else {
            $env:_PYTHON_HOST_PLATFORM = "macosx-12.0-x86_64"
            $env:ARCHFLAGS = "-arch x86_64"
        }
        # Self-contained wheel: build the native core and the pybind extension in one
        # build.py pass (used for EPs without a dedicated core producer).
        $buildArgs = @(
          "--config", $cfg,
          "--parallel",
          "--skip_tests",
          "--skip_examples",
          "--use_guidance",
          "--build_dir", "$(Build.Repository.LocalPath)/build/$(ep)"
        )
        $ortArg = "$(ORT_HOME_CMAKE_ARG)"
        if ($ortArg -match '^-DORT_HOME=(.*)$') { $buildArgs += @("--ort_home", $Matches[1]) }
        $buildArgs += @("--cmake_extra_defines") + $extraDefines
        Write-Host "python build.py $buildArgs"
        python build.py @buildArgs
      displayName: 'Build Python wheel $(PyNoDotVer) (full build)'
      workingDirectory: '$(Build.Repository.LocalPath)'

  - task: CopyFiles@2
    displayName: 'Copy Python Wheel to: $(Build.ArtifactStagingDirectory)'
    inputs:
      SourceFolder: '$(Build.Repository.LocalPath)/build/$(ep)'
      Contents: '**/wheel/*.whl'
      TargetFolder: '$(Build.ArtifactStagingDirectory)/wheel'
      flattenFolders: true

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish Artifact: ONNXRuntime python wheel'
    inputs:
      artifactName: $(artifactName)-$(PyNoDotVer)-wheel
      targetPath: '$(Build.ArtifactStagingDirectory)/wheel'
