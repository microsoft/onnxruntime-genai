parameters:
- name: target
  type: string
- name: ep
  type: string
  default: 'cpu'
- name: arch
  type: string
  default: 'x64'
- name: build_config
  type: string
  default: 'release'
- name: ort_build_version
  type: string
  default: 'default'
- name: ort_build_source
  type: string
  default: 'NuGet'

steps:

- checkout: self
  clean: true
  path: onnxruntime-genai
  submodules: recursive

- script: |
    set -e -x
    echo "$(Build.SourcesDirectory)"
    echo "$(Build.Repository.LocalPath)"
    ls $(Build.SourcesDirectory) -R
  displayName: 'List files from SourceDirectory'

- template: utils/set-nightly-build-option-variable.yml

- bash: |
    echo "arch=$(arch)"
    echo "ort_version=$(ort_version)"
    echo "ep=$(ep)"
    echo "cuda_version=$(cuda_version)"
    echo "target=${{ parameters.target }}"
    echo "build_config=${{ parameters.build_config }}"
  displayName: 'Print Parameters'

- task: Docker@2
  displayName: 'Login to Azure container registry'
  inputs:
    containerRegistry: 'onnxruntimebuildcache'
    command: 'login'
    addPipelineData: false

- bash: |
    set -e -x
    python3 -m pip install requests
    cuda_dockerfile_version="$(cuda_version)"
    if [[ "$(cuda_version)" == 13.* ]]; then
      cuda_dockerfile_version="13"
    fi
    python3 tools/ci_build/get_docker_image.py --dockerfile tools/ci_build/github/linux/docker/manylinux/Dockerfile.manylinux2_28_$(ep)_$cuda_dockerfile_version \
      --context tools/ci_build/github/linux/docker/manylinux \
      --docker-build-args "--build-arg BUILD_UID=$( id -u )" \
      --container-registry onnxruntimebuildcache \
      --repository ortgenai$(ep)build$(arch)
  displayName: 'Get CUDA Docker Image $(cuda_version)'
  condition: eq(variables['ep'], 'cuda')
  workingDirectory: '$(Build.Repository.LocalPath)'

- bash: |
    set -e -x
    python3 -m pip install requests
    if [ "$(arch)" = "arm64" ]; then
      dockerfile="tools/ci_build/github/linux/docker/manylinux/Dockerfile.manylinux2_28_$(ep)_aarch64"
    else
      dockerfile="tools/ci_build/github/linux/docker/manylinux/Dockerfile.manylinux2_28_$(ep)"
    fi
    python3 tools/ci_build/get_docker_image.py --dockerfile "$dockerfile" \
      --context tools/ci_build/github/linux/docker/manylinux \
      --docker-build-args "--build-arg BUILD_UID=$( id -u )" \
      --container-registry onnxruntimebuildcache \
      --repository ortgenai$(ep)build$(arch)
  displayName: 'Get Docker Image'
  condition: ne(variables['ep'], 'cuda')
  workingDirectory: '$(Build.Repository.LocalPath)'

- bash: |
    set -e -x
    cmake_extra_args=""
    cuda_archs=""
    if [ "$(ep)" = "cuda" ]; then
      if [[ "$(cuda_version)" == 13.* ]]; then
        cuda_archs="75-real;80-real;86-real;89-real;90-real;100-real;120-real;120-virtual"
      else
        cuda_archs="60-real;70-real;75-real;80-real;86-real;89-real;90-real;100-real;120"
      fi
      cmake_extra_args="-DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc -DCMAKE_CUDA_ARCHITECTURES=\\\"${cuda_archs}\\\""
    fi
    echo "##vso[task.setvariable variable=CMAKE_EXTRA_ARGS;]$cmake_extra_args"
    echo "##vso[task.setvariable variable=CUDA_ARCHS;]$cuda_archs"
  displayName: 'Set CMake Extra Args'
  workingDirectory: '$(Build.Repository.LocalPath)'

- ${{ if ne(parameters.ort_build_version, 'default') }}:
  - bash: |
      set -e -x
      ep="$(ep)"
      arch="$(arch)"

      # Determine package name
      case "$ep" in
          "cuda") package_name="Microsoft.ML.OnnxRuntime.Gpu.Linux" ;;
          *) package_name="Microsoft.ML.OnnxRuntime" ;;
      esac

      org_name="aiinfra"
      feed_project="2692857e-05ef-43b4-ba9c-ccf1c22c437c"
      feed_id="7982ae20-ed19-4a35-a362-a96ac99897b7"
      version="${{ parameters.ort_build_version }}"

      source="${{ parameters.ort_build_source }}"
      if [ "$source" = "Ort-Nightly" ]; then
          url="https://pkgs.dev.azure.com/${org_name}/${feed_project}/_apis/packaging/feeds/${feed_id}/nuget/packages/${package_name}/versions/${version}/content?api-version=6.0-preview.1"
      else
          url="https://www.nuget.org/api/v2/package/${package_name}/${version}"
      fi

      echo "Downloading $package_name version $version"
      download_path="$(Agent.TempDirectory)/ort_build_pkg.zip"
      curl --fail --retry 5 --retry-all-errors -L -o "$download_path" "$url"

      if [ ! -s "$download_path" ]; then
          echo "Error: Downloaded ORT package is missing or empty at $download_path"
          exit 1
      fi

      extract_path="$(Agent.TempDirectory)/ort_build_extracted"
      mkdir -p "$extract_path"
      unzip -o "$download_path" -d "$extract_path"

      ort_home="$(Build.Repository.LocalPath)/ort_build"
      mkdir -p "$ort_home/include"
      mkdir -p "$ort_home/lib"

      # Copy headers
      # CUDA packages store headers in buildTransitive/native/include, while other
      # ORT packages (CPU) use build/native/include per NuGet package layout.
      if [ "$ep" = "cuda" ]; then
          cp -r "$extract_path/buildTransitive/native/include/"* "$ort_home/include/"
      else
          cp -r "$extract_path/build/native/include/"* "$ort_home/include/"
      fi

      # Copy libraries
      platform="linux-x64"
      if [ "$arch" = "arm64" ]; then
          platform="linux-arm64"
      fi
      cp -r "$extract_path/runtimes/$platform/native/"* "$ort_home/lib/"

      echo "ORT_HOME: $ort_home"
      ls -la "$ort_home/include/"
      ls -la "$ort_home/lib/"
      # Inside Docker, the path is /ort_genai_src/ort_build
      echo "##vso[task.setvariable variable=ORT_HOME_CMAKE_ARG]-DORT_HOME=/ort_genai_src/ort_build"
    displayName: 'Download ORT build package ${{ parameters.ort_build_version }}'
    workingDirectory: '$(Build.Repository.LocalPath)'

- ${{ if eq(parameters.target, 'onnxruntime-genai') }}:
  - script: |
      set -e -x
      # Map the pipeline's lowercase build config to build.py's capitalized --config.
      case "$(build_config)" in
        release)        cfg="Release" ;;
        relwithdebinfo) cfg="RelWithDebInfo" ;;
        debug)          cfg="Debug" ;;
        *)              cfg="Release" ;;
      esac

      ep_args=""
      if [ "$(ep)" = "cuda" ]; then
        ep_args="--use_cuda --cuda_home /usr/local/cuda --cuda_archs $(CUDA_ARCHS)"
      fi

      ort_args=""
      if [ "${{ parameters.ort_build_version }}" != "default" ]; then
        ort_args="--ort_home /ort_genai_src/ort_build"
      fi

      docker run \
      --rm \
      --volume $(Build.Repository.LocalPath):/ort_genai_src \
      -w /ort_genai_src/ \
      -e CFG="$cfg" \
      -e EP_ARGS="$ep_args" \
      -e ORT_ARGS="$ort_args" \
      ortgenai$(ep)build$(arch) \
      bash -c '
          set -e -x
          python3 build.py \
            --config "$CFG" \
            --parallel \
            --skip_tests \
            --skip_examples \
            --use_guidance \
            --cmake_extra_defines ENABLE_PYTHON=OFF ENABLE_TESTS=OFF \
            --build_dir /ort_genai_src/build/$(ep) \
            --install_dir /ort_genai_src/build/$(ep)/install/$(artifactName) \
            $ORT_ARGS $EP_ARGS'
    displayName: 'Build GenAI core (build.py)'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - task: BinSkim@4
    displayName: 'Run BinSkim'
    inputs:
      AnalyzeTargetGlob: '$(Build.Repository.LocalPath)/build/**/*genai.so'
    continueOnError: true

  - bash: |
      set -e -x
      prefix="$(Build.Repository.LocalPath)/build/$(ep)/install/$(artifactName)"
      # The core export installs lib/, include/ and the license/notice files. The
      # NuGet packer additionally expects VERSION_INFO alongside them, so stage it in.
      cp "$(Build.Repository.LocalPath)/VERSION_INFO" "$prefix/"
      mkdir -p "$(Build.ArtifactStagingDirectory)/capi"
      # Archive with the root folder == artifactName so the archive contains
      # <artifactName>/lib/<native libs>, matching the packer's extraction contract.
      tar -C "$(Build.Repository.LocalPath)/build/$(ep)/install" \
        -czf "$(Build.ArtifactStagingDirectory)/capi/$(artifactName).tar.gz" \
        "$(artifactName)"
      ls -la "$(Build.ArtifactStagingDirectory)/capi"
    displayName: 'Assemble C/C++ API archive'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish Artifact: ONNXRuntime GenAI capi'
    inputs:
      artifactName: $(artifactName)-capi
      targetPath: '$(Build.ArtifactStagingDirectory)/capi'

- ${{ if eq(parameters.target, 'python') }}:
  - bash: |
      set -e -x
      docker run \
      --rm \
      --volume $(Build.Repository.LocalPath):/ort_genai_src \
      -w /ort_genai_src/ \
      -e ONNXRUNTIME_VERSION=$(ONNXRUNTIME_VERSION) \
      ortgenai$(ep)build$(arch) \
      bash -c " \
          /usr/bin/cmake --preset linux_gcc_$(ep)_$(build_config) \
            -DENABLE_TESTS=OFF \
            -DMANYLINUX=ON \
            -DPYTHON_EXECUTABLE=/opt/python/cp$(PyNoDotVer)-cp$(PyNoDotVer)/bin/python$(PyDotVer) \
            $(CMAKE_EXTRA_ARGS) $(ORT_HOME_CMAKE_ARG) && \
          /usr/bin/cmake --build --preset linux_gcc_$(ep)_$(build_config) \
            --target python"
    displayName: 'Build Python $(PyNoDotVer)'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - bash: |
      set -e -x
      docker run \
      --rm \
      --volume $(Build.Repository.LocalPath):/ort_genai_src \
      -w /ort_genai_src/ \
      -e ONNXRUNTIME_VERSION=$(ONNXRUNTIME_VERSION) \
      ortgenai$(ep)build$(arch) \
      bash -c " \
          /usr/bin/cmake --build --preset linux_gcc_$(ep)_$(build_config) \
            -DENABLE_TESTS=OFF \
            -DMANYLINUX=ON \
            -DPYTHON_EXECUTABLE=/opt/python/cp$(PyNoDotVer)-cp$(PyNoDotVer)/bin/python$(PyDotVer) && \
          /usr/bin/cmake --build --preset linux_gcc_$(ep)_$(build_config) \
            --target PyPackageBuild"
    displayName: 'PyPackageBuild $(PyNoDotVer)'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - task: CopyFiles@2
    displayName: 'Copy Python Wheel to: $(Build.ArtifactStagingDirectory)'
    inputs:
      SourceFolder: '$(Build.Repository.LocalPath)/build/$(ep)/wheel'
      Contents: '*manylinux*.whl'
      TargetFolder: '$(Build.ArtifactStagingDirectory)/wheel'

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish Artifact: ONNXRuntime python wheel'
    inputs:
      artifactName: $(artifactName)-$(PyNoDotVer)-wheel
      targetPath: '$(Build.ArtifactStagingDirectory)/wheel'

- script: |
    ls $(Build.Repository.LocalPath) -R
  displayName: 'List files from SourceDirectory'
