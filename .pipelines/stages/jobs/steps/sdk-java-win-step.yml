# =============================================================================
# sdk-java-win-step.yml — Windows Java SDK (desktop JVM jar) build step.
#
# Builds the per-platform Windows desktop jar *incrementally* against a prebuilt
# core (same model as the Linux step). The jar bundles its native libs under
# ai/onnxruntime/genai/native/win-<jni_arch>/; the combine job later merges all
# platforms' native subdirs into a single multi-platform jar.
#
# Job-level variables expected from the parent job:
#   corePkgDir     - dir the core cmake-pkg artifact is downloaded into
#   ortHome        - dir ORT headers+libs are unpacked into
#   jsdkBuildDir   - build.py --build_dir for the SDK (e.g. build/jsdk)
#   artifactName   - artifact name prefix (e.g. java-win-x64-cpu)
# =============================================================================

parameters:
- name: arch
  type: string
  values: [x64, arm64]
- name: ep
  type: string
  values: [cpu]
- name: build_config
  type: string
  default: Release
- name: ort_version
  type: string
- name: core_artifact
  type: string

steps:

# --- Python (to run build.py) -----------------------------------------------
# The win Java job always runs on the win-x64 pool (win-arm64 is cross-compiled
# here via -A ARM64), so the host Python is always x64.
- task: UsePythonVersion@0
  displayName: 'Use Python 3.11 (x64)'
  inputs:
    versionSpec: '3.11'
    addToPath: true
    architecture: 'x64'

- task: PipAuthenticate@1
  displayName: 'Authenticate pip to Lotus feed'
  inputs:
    artifactFeeds: '$(lotusFeedName)'
    onlyAddExtraIndex: false

- script: python -m pip install requests
  displayName: 'Install build-time Python deps'

# --- Download prebuilt core CMake package -----------------------------------
- task: DownloadPipelineArtifact@2
  displayName: 'Download core CMake package (${{ parameters.core_artifact }})'
  inputs:
    artifactName: '${{ parameters.core_artifact }}'
    targetPath: '$(corePkgDir)'

# --- Download ORT from Lotus feed (authenticated) ---------------------------
- powershell: |
    $ErrorActionPreference = 'Stop'
    $pkgName = 'Microsoft.ML.OnnxRuntime'
    $url = "$(lotusOrtContentBase)/$pkgName/versions/${{ parameters.ort_version }}/content?api-version=6.0-preview.1"
    Write-Host "Downloading $pkgName ${{ parameters.ort_version }} from Lotus"
    $zip = "$(Agent.TempDirectory)\ort.zip"
    Invoke-WebRequest -Uri $url -OutFile $zip -ErrorAction Stop `
      -Headers @{ Authorization = "Bearer $env:SYSTEM_ACCESSTOKEN" }
    Expand-Archive -Path $zip -DestinationPath "$(Agent.TempDirectory)\ort_extracted" -Force
    New-Item -ItemType Directory -Force -Path "$(ortHome)\include","$(ortHome)\lib" | Out-Null
    $platform = 'win-${{ parameters.arch }}'
    Copy-Item "$(Agent.TempDirectory)\ort_extracted\build\native\include\*" "$(ortHome)\include\" -Recurse -Force
    Copy-Item "$(Agent.TempDirectory)\ort_extracted\runtimes\$platform\native\*" "$(ortHome)\lib\" -Recurse -Force
  displayName: 'Download ORT ${{ parameters.ort_version }} from Lotus feed'
  workingDirectory: '$(Build.SourcesDirectory)'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

# --- Build the desktop jar incrementally against the prebuilt core ----------
- powershell: |
    $ErrorActionPreference = 'Stop'
    $args = @(
      'build.py',
      '--sdk', 'java',
      '--config', '${{ parameters.build_config }}',
      '--parallel',
      '--prebuilt_genai_home', '$(corePkgDir)',
      '--ort_home', '$(ortHome)',
      '--build_dir', '$(jsdkBuildDir)'
    )
    if ('${{ parameters.arch }}' -eq 'arm64') { $args += '--arm64' }
    Write-Host "Running: python $($args -join ' ')"
    & python @args
    if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
  displayName: 'Build Java jar (incremental)'
  workingDirectory: '$(Build.SourcesDirectory)'
  env:
    # Gradle feed isolation: resolve deps + plugins from the Lotus Maven feed.
    ORG_GRADLE_PROJECT_lotusMavenUrl: '$(lotusMavenFeed)'
    ORG_GRADLE_PROJECT_lotusMavenToken: '$(System.AccessToken)'
    # Pin the jar/POM's onnxruntime Maven dependency to the same ORT the JNI was built against.
    ONNXRUNTIME_VERSION: '${{ parameters.ort_version }}'

# --- Assert the jar is produced + stage for publishing ----------------------
- powershell: |
    $ErrorActionPreference = 'Stop'
    $jar = Get-ChildItem -Recurse "$(Build.SourcesDirectory)\$(jsdkBuildDir)" -Filter 'onnxruntime-genai*.jar' |
      Where-Object { $_.Name -notmatch 'sources|javadoc' } | Select-Object -First 1
    if (-not $jar) { Write-Error "ASSERT FAIL: no jar produced"; exit 1 }
    Write-Host "Jar: $($jar.FullName)"
    Add-Type -AssemblyName System.IO.Compression.FileSystem
    $zip = [System.IO.Compression.ZipFile]::OpenRead($jar.FullName)
    try { $names = $zip.Entries | ForEach-Object { $_.FullName } } finally { $zip.Dispose() }
    if (-not ($names -match 'onnxruntime-genai-jni\.dll')) {
      Write-Error "ASSERT FAIL: jar does not contain the JNI native library (onnxruntime-genai-jni.dll)"; exit 1
    }
    if (-not ($names -match '/onnxruntime-genai\.dll')) {
      Write-Error "ASSERT FAIL: jar does not contain the core native library (onnxruntime-genai.dll)"; exit 1
    }
    Write-Host "ASSERT OK: jar contains the JNI + core native libraries"
    $stage = "$(Build.SourcesDirectory)\jar_stage"
    New-Item -ItemType Directory -Force -Path $stage | Out-Null
    Get-ChildItem -Recurse "$(Build.SourcesDirectory)\$(jsdkBuildDir)" -Filter 'onnxruntime-genai*.jar' |
      ForEach-Object { Copy-Item $_.FullName $stage -Force }
  displayName: 'Assert: jar produced + bundles native lib'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Authenticode-sign the JNI shim inside the jar --------------------------
# The core dll embedded in the jar is already ESRP-signed at the core stage, but
# the JNI shim (onnxruntime-genai-jni.dll) is built here and is unsigned. Extract
# it, sign it, then update the jar entry in place.
- powershell: |
    $ErrorActionPreference = 'Stop'
    $stage = "$(Build.SourcesDirectory)\jar_stage"
    $jar = Get-ChildItem $stage -Filter 'onnxruntime-genai*.jar' |
      Where-Object { $_.Name -notmatch 'sources|javadoc' } | Select-Object -First 1
    if (-not $jar) { Write-Error "no main jar to sign"; exit 1 }
    $work = "$(Build.SourcesDirectory)\jni_sign"
    Remove-Item -Recurse -Force $work -ErrorAction SilentlyContinue
    New-Item -ItemType Directory -Force -Path $work | Out-Null
    $jniArch = if ('${{ parameters.arch }}' -eq 'arm64') { 'aarch64' } else { '${{ parameters.arch }}' }
    $entry = "ai/onnxruntime/genai/native/win-$jniArch/onnxruntime-genai-jni.dll"
    $jarExe = if ($env:JAVA_HOME) { Join-Path $env:JAVA_HOME 'bin\jar.exe' } else { 'jar' }
    Push-Location $work
    & $jarExe xf $jar.FullName $entry
    Pop-Location
    if (-not (Test-Path (Join-Path $work $entry))) { Write-Error "JNI dll not extracted: $entry"; exit 1 }
    Write-Host "##vso[task.setvariable variable=jniMainJar]$($jar.FullName)"
    Write-Host "##vso[task.setvariable variable=jniSignDir]$work"
  displayName: 'Extract JNI shim for signing'
  workingDirectory: '$(Build.SourcesDirectory)'

- template: compliant/win-esrp-dll-step.yml
  parameters:
    FolderPath: '$(jniSignDir)'
    DisplayName: 'ESRP - sign JNI shim (onnxruntime-genai-jni.dll)'
    Pattern: 'onnxruntime-genai-jni.dll'

- powershell: |
    $ErrorActionPreference = 'Stop'
    $jniArch = if ('${{ parameters.arch }}' -eq 'arm64') { 'aarch64' } else { '${{ parameters.arch }}' }
    $entry = "ai/onnxruntime/genai/native/win-$jniArch/onnxruntime-genai-jni.dll"
    $jarExe = if ($env:JAVA_HOME) { Join-Path $env:JAVA_HOME 'bin\jar.exe' } else { 'jar' }
    Push-Location "$(jniSignDir)"
    & $jarExe uf "$(jniMainJar)" $entry
    Pop-Location
    Write-Host "Updated $entry in $(jniMainJar) with the signed JNI shim"
  displayName: 'Update jar with signed JNI shim'
  workingDirectory: '$(Build.SourcesDirectory)'

# --- Publish per-platform jar ------------------------------------------------
- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish Java jar ($(artifactName))'
  inputs:
    artifactName: '$(artifactName)-jar'
    targetPath: '$(Build.SourcesDirectory)\jar_stage'
