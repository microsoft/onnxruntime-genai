steps:
# NOTE: CredScan and TSA upload are auto-injected by the 1ES Official template via the
# `sdl:` block in packaging.yml (sdl.tsa.enabled). Do NOT add manual CredScan@3 /
# TSAUpload@2 tasks here — running them alongside the SDL-injected ones causes duplicate
# CredScan runs and TSA double-publish conflicts.
- template: compliant/component-governance-component-detection-step.yml
  parameters:
    condition: 'succeeded'

- task: mspremier.PostBuildCleanup.PostBuildCleanup-task.PostBuildCleanup@3
  displayName: 'Clean Agent Directories'
  condition: always()
