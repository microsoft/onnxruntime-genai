# Stage 2 (SDK) — Linux Python wheels built against the prebuilt core (manylinux).
# For each Python version, build.py configures the standalone src/python project via
# find_package(onnxruntime-genai) and compiles only the pybind extension.
parameters:
- name: ep
  type: string
  default: 'cpu'
- name: arch
  type: string
  default: 'x64'
- name: build_config
  type: string
  default: 'RelWithDebInfo'
- name: ort_build_version
  type: string
  default: 'default'
- name: ort_build_source
  type: string
  default: 'NuGet'
- name: python_versions
  type: object
  default: ['3.11', '3.12', '3.13', '3.14']

steps:
- template: utils/set-nightly-build-option-variable.yml

- task: Docker@2
  displayName: 'Login to Azure container registry'
  inputs:
    containerRegistry: 'onnxruntimebuildcache'
    command: 'login'
    addPipelineData: false

- bash: |
    set -e -x
    python3 -m pip install requests
    cuda_dockerfile_version="$(cuda_version)"
    [[ "$(cuda_version)" == 13.* ]] && cuda_dockerfile_version="13"
    if [ "$(ep)" = "cuda" ]; then
      dockerfile="tools/ci_build/github/linux/docker/manylinux/Dockerfile.manylinux2_28_$(ep)_$cuda_dockerfile_version"
    elif [ "$(arch)" = "arm64" ]; then
      dockerfile="tools/ci_build/github/linux/docker/manylinux/Dockerfile.manylinux2_28_$(ep)_aarch64"
    else
      dockerfile="tools/ci_build/github/linux/docker/manylinux/Dockerfile.manylinux2_28_$(ep)"
    fi
    python3 tools/ci_build/get_docker_image.py --dockerfile "$dockerfile" \
      --context tools/ci_build/github/linux/docker/manylinux \
      --docker-build-args "--build-arg BUILD_UID=$( id -u )" \
      --container-registry onnxruntimebuildcache \
      --repository ortgenai$(ep)build$(arch)
  displayName: 'Get Docker Image'
  workingDirectory: '$(Build.Repository.LocalPath)'

# Single-source ORT for the wheel's pybind extension (headers + import libs).
- bash: |
    set -e -x
    ep="$(ep)"; arch="$(arch)"
    case "$ep" in
      "cuda") package_name="Microsoft.ML.OnnxRuntime.Gpu.Linux" ;;
      *) package_name="Microsoft.ML.OnnxRuntime" ;;
    esac
    version="${{ parameters.ort_build_version }}"
    [ "$version" = "default" ] && version="$(ort_version)"
    org_name="aiinfra"
    feed_project="2692857e-05ef-43b4-ba9c-ccf1c22c437c"
    feed_id="7982ae20-ed19-4a35-a362-a96ac99897b7"
    if [ "${{ parameters.ort_build_source }}" = "Ort-Nightly" ]; then
      url="https://pkgs.dev.azure.com/${org_name}/${feed_project}/_apis/packaging/feeds/${feed_id}/nuget/packages/${package_name}/versions/${version}/content?api-version=6.0-preview.1"
    else
      url="https://www.nuget.org/api/v2/package/${package_name}/${version}"
    fi
    download_path="$(Agent.TempDirectory)/ort_pkg.zip"
    curl --fail --retry 5 --retry-all-errors -L -o "$download_path" "$url"
    extract_path="$(Agent.TempDirectory)/ort_extracted"
    mkdir -p "$extract_path"; unzip -o "$download_path" -d "$extract_path"
    ort_home="$(Build.Repository.LocalPath)/ort_build"
    mkdir -p "$ort_home/include" "$ort_home/lib"
    if [ "$ep" = "cuda" ]; then
      cp -r "$extract_path/buildTransitive/native/include/"* "$ort_home/include/"
    else
      cp -r "$extract_path/build/native/include/"* "$ort_home/include/"
    fi
    platform="linux-x64"; [ "$arch" = "arm64" ] && platform="linux-arm64"
    cp -r "$extract_path/runtimes/$platform/native/"* "$ort_home/lib/"
  displayName: 'Download ORT for wheel'
  workingDirectory: '$(Build.Repository.LocalPath)'

- ${{ each py in parameters.python_versions }}:
  - bash: |
      set -e -x
      pyver="${{ py }}"
      pynodot="${pyver//./}"
      docker run --rm \
        --volume $(Build.Repository.LocalPath):/ort_genai_src \
        -w /ort_genai_src/ \
        ortgenai$(ep)build$(arch) \
        bash -c "
          set -e -x
          export PATH=/opt/python/cp${pynodot}-cp${pynodot}/bin:\$PATH
          python -m pip install pybind11 wheel requests
          python build.py \
            --config ${{ parameters.build_config }} \
            --build_dir /ort_genai_src/build/$(ep)/cp${pynodot} \
            --prebuilt_genai_home /ort_genai_src/core \
            --ort_home /ort_genai_src/ort_build \
            --sdk python \
            --update --build --parallel \
            --cmake_extra_defines MANYLINUX=ON PYTHON_EXECUTABLE=/opt/python/cp${pynodot}-cp${pynodot}/bin/python${pyver}"
    displayName: 'Build wheel cp${{ py }}'
    workingDirectory: '$(Build.Repository.LocalPath)'

- task: CopyFiles@2
  displayName: 'Collect wheels'
  inputs:
    SourceFolder: '$(Build.Repository.LocalPath)/build/$(ep)'
    Contents: '**/*.whl'
    TargetFolder: '$(Build.ArtifactStagingDirectory)/wheel'
    flattenFolders: true

- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish Artifact: python wheels'
  inputs:
    artifactName: $(artifactName)-wheel
    targetPath: '$(Build.ArtifactStagingDirectory)/wheel'
