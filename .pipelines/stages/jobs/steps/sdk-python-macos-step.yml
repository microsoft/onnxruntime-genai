# =============================================================================
# sdk-python-macos-step.yml — macOS Python SDK (wheel) build step (Phase 5 / Batch A).
#
# Builds the macOS (arm64) Python wheel *incrementally* against a prebuilt core
# (same model as the linux/win steps), natively on a mac agent:
#   1. Download the core CMake-package artifact for this cell.
#   2. Download ORT (osx-arm64) from Lotus (the standalone python cmake needs ORT_HOME).
#   3. build.py --sdk python --prebuilt_genai_home <core> --ort_home <ort>.
#   4. Smoke-assert the wheel imports and reports the expected version.
#   5. Publish the wheel artifact.
#
# The core is NOT recompiled — only the pybind extension + wheel are built.
# macOS is CPU-only.
#
# Job-level variables expected from the parent job:
#   corePkgDir    - dir the core cmake-pkg artifact is downloaded into
#   ortHome       - dir ORT headers+libs are unpacked into
#   pysdkBuildDir - build.py --build_dir for the SDK (e.g. build/pysdk)
#   artifactName  - artifact name prefix (e.g. python-osx-arm64-cpu)
# =============================================================================

parameters:
- name: arch
  type: string
  values: [arm64]
- name: ep
  type: string
  values: [cpu]
- name: build_config
  type: string
  default: Release
- name: ort_version
  type: string
- name: core_artifact
  type: string
- name: python_versions
  type: object
  default: [ '3.11', '3.12', '3.13', '3.14' ]
- name: python_dependency_version
  type: string
  default: '1.27.0'

steps:

# --- Feed isolation: pip → Lotus (authenticated) ----------------------------
# (Python interpreters are selected per-version in the build loop below.)
- task: PipAuthenticate@1
  displayName: 'Authenticate pip to Lotus feed'
  inputs:
    artifactFeeds: '$(lotusFeedName)'
    onlyAddExtraIndex: false

# --- Download prebuilt core CMake package -----------------------------------
- task: DownloadPipelineArtifact@2
  displayName: 'Download core CMake package (${{ parameters.core_artifact }})'
  inputs:
    artifactName: '${{ parameters.core_artifact }}'
    targetPath: '$(corePkgDir)'

# --- Download ORT from Lotus feed (authenticated) ---------------------------
- bash: |
    set -e
    pkg_name='Microsoft.ML.OnnxRuntime'
    url="$(lotusOrtContentBase)/${pkg_name}/versions/${{ parameters.ort_version }}/content?api-version=6.0-preview.1"
    echo "Downloading $pkg_name ${{ parameters.ort_version }} from Lotus"
    mkdir -p ort_home/include ort_home/lib
    # No `set -x` — do not echo the token.
    curl --fail --retry 5 --retry-all-errors -L \
      -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" \
      -o ort.zip "$url"
    unzip -o ort.zip -d ort_extracted >/dev/null
    cp -r ort_extracted/build/native/include/* ort_home/include/
    cp -r ort_extracted/runtimes/osx-arm64/native/* ort_home/lib/
    ls -la ort_home/include ort_home/lib
  displayName: 'Download ORT ${{ parameters.ort_version }} from Lotus feed'
  workingDirectory: '$(Build.SourcesDirectory)'
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

# --- Build the wheel incrementally against the prebuilt core ----------------
# --- Build a wheel per Python version, incrementally against the prebuilt core
# The core is built once (Python-agnostic). For each requested Python version we
# select that interpreter and (re)build ONLY the pybind extension + wheel against
# the SAME prebuilt core (arm64), then assert + stage.
- ${{ each pyVer in parameters.python_versions }}:
  - task: UsePythonVersion@0
    displayName: 'Use Python ${{ pyVer }}'
    inputs:
      versionSpec: '${{ pyVer }}'
      addToPath: true

  - script: python3 -m pip install --user --break-system-packages pybind11 wheel requests
    displayName: 'Install build-time Python deps (${{ pyVer }})'

  - bash: |
      set -e -x
      export MACOSX_DEPLOYMENT_TARGET=12.0
      python3 build.py --sdk python \
        --config ${{ parameters.build_config }} \
        --parallel \
        --prebuilt_genai_home "$(corePkgDir)" \
        --ort_home "$(Build.SourcesDirectory)/ort_home" \
        --cmake_extra_defines CMAKE_OSX_ARCHITECTURES=arm64 \
        --build_dir "$(pysdkBuildDir)-${{ pyVer }}"
    displayName: 'Build Python ${{ pyVer }} wheel (incremental)'
    workingDirectory: '$(Build.SourcesDirectory)'
    env:
      # Pin the wheel's runtime onnxruntime dependency (onnxruntime>=<ver>).
      # Decoupled from the build-time ORT (ort_version) — see setup.py.in.
      ONNXRUNTIME_VERSION: '${{ parameters.python_dependency_version }}'
      # The UsePythonVersion interpreter on macOS is universal2, so `pip wheel` would
      # otherwise tag the wheel macosx_*_universal2 even though the extension + core
      # dylib are arm64-only. Force an arm64 platform tag + build arch (cibuildwheel
      # convention, matching the in-tree capi-macos-step).
      _PYTHON_HOST_PLATFORM: 'macosx-12.0-arm64'
      ARCHFLAGS: '-arch arm64'

  # --- Assert the wheel is produced (+ import, degraded if ORT unavailable) --
  # The runtime import test needs the `onnxruntime` wheel for this platform. The
  # Lotus feed is currently missing the osx-arm64 onnxruntime variant, so if it
  # can't be installed we gracefully fall back to asserting the wheel is produced
  # and correctly arm64-tagged (mirrors the CUDA path, which also skips import).
  - bash: |
      set -e
      whl=$(find "$(Build.SourcesDirectory)/$(pysdkBuildDir)-${{ pyVer }}" -name '*.whl' | head -n1)
      [ -n "$whl" ] || { echo "ASSERT FAIL: no wheel produced for ${{ pyVer }}"; exit 1; }
      echo "Wheel: $whl"
      whl_name=$(basename "$whl")

      # The wheel must be arm64-tagged (not universal2 / x86_64).
      case "$whl_name" in
        *arm64*) echo "ASSERT OK: wheel is arm64-tagged ($whl_name)" ;;
        *) echo "ASSERT FAIL: wheel is not arm64-tagged: $whl_name"; exit 1 ;;
      esac
      # The wheel must be tagged for this Python version (cp3XX).
      cpTag="cp$(echo '${{ pyVer }}' | tr -d '.')"
      echo "$whl_name" | grep -q "$cpTag" || { echo "ASSERT FAIL: wheel for ${{ pyVer }} not tagged $cpTag: $whl_name"; exit 1; }

      # Try the full runtime import test; skip gracefully if the onnxruntime runtime
      # wheel for this platform is unavailable on Lotus (osx-arm64 gap).
      if python3 -m pip install --user --break-system-packages "onnxruntime==${{ parameters.python_dependency_version }}"; then
        python3 -m pip install --user --break-system-packages --force-reinstall --no-deps "$whl"
        expected=$(tr -d '[:space:]' < "$(Build.SourcesDirectory)/VERSION_INFO")
        actual=$(python3 -c "import onnxruntime_genai as og; print(og.__version__)" | tr -d '[:space:]')
        echo "expected=$expected actual=$actual"
        [ "$expected" = "$actual" ] || { echo "ASSERT FAIL: wheel version mismatch"; exit 1; }
        echo "ASSERT OK: wheel imports and reports $actual"
      else
        echo "WARNING: onnxruntime==${{ parameters.python_dependency_version }} has no osx-arm64 wheel on Lotus PyPI"
        echo "         (win/linux wheels are present; the macOS variant is not mirrored) — skipping the runtime import test."
        echo "ASSERT OK (degraded): wheel produced + arm64-tagged"
      fi

      mkdir -p "$(Build.ArtifactStagingDirectory)/wheel"
      cp "$whl" "$(Build.ArtifactStagingDirectory)/wheel/"
    displayName: 'Assert: Python ${{ pyVer }} wheel produced'
    workingDirectory: '$(Build.SourcesDirectory)'

# --- Publish all wheels ------------------------------------------------------
- task: 1ES.PublishPipelineArtifact@1
  displayName: 'Publish Python wheels ($(artifactName))'
  inputs:
    artifactName: '$(artifactName)'
    targetPath: '$(Build.ArtifactStagingDirectory)/wheel'
