parameters:
- name: target
  type: string
  default: 'onnxruntime-genai'
- name: ep
  type: string
  default: 'cpu'
- name: arch
  type: string
  default: 'x64'
- name: build_config
  type: string
  default: 'release'
- name: enable_winml
  type: boolean
  default: false
- name: ort_build_version
  type: string
  default: 'default'
- name: ort_build_source
  type: string
  default: 'NuGet'
# When true, build the wheel incrementally against the prebuilt '-core' artifact.
# When false, build the core and the pybind extension together in one build.py pass.
- name: prebuilt_core
  type: boolean
  default: false

steps:
- bash: |
    echo "##[error]Error: ep and arch are not set"
    exit 1
  displayName: 'Check if variables arch and ep are set'
  condition: or( eq (variables['ep'], ''), eq (variables['arch'], ''))

- checkout: self
  lfs: true
  path: onnxruntime-genai
  clean: true
  submodules: recursive

- task: onebranch.pipeline.tsaoptions@1
  displayName: 'OneBranch TSAOptions'
  inputs:
    tsaConfigFilePath: '$(Build.Repository.LocalPath)\.config\tsaoptions.json'
    appendSourceBranchName: false

- template: utils/set-nightly-build-option-variable.yml

- task: NuGetToolInstaller@1

- script: |
    echo "arch=$(arch)"
    echo "ort_version=$(ort_version)"
    echo "ep=$(ep)"
    echo "cuda_version=$(cuda_version)"
    echo "target=${{ parameters.target }}"
    echo "build_config=${{ parameters.build_config }}"

  displayName: 'Print Parameters'

- task: CmdLine@2
  displayName: "Ensure nuget.exe"
  inputs:
    workingDirectory: '$(Build.Repository.LocalPath)'
    script: |
      where nuget.exe

- powershell: |
    azcopy.exe cp --recursive "https://lotusscus.blob.core.windows.net/models/cuda_sdk/v$(cuda_version)" 'cuda_sdk'
  displayName: 'Download CUDA $(cuda_version)'
  condition: and(eq(variables['arch'], 'x64'), or(eq(variables['ep'], 'cuda'), eq(variables['ep'], 'winml')))
  workingDirectory: '$(Build.Repository.LocalPath)'

- powershell: |
    Write-Host "Downloading Azure CLI..."
    $azCliUrl = "https://aka.ms/installazurecliwindows"
    $installerPath = "$(Agent.TempDirectory)\AzureCLI.msi"
    Invoke-WebRequest -Uri $azCliUrl -OutFile $installerPath
    Write-Host "Installing Azure CLI..."
    Start-Process -FilePath "msiexec.exe" -ArgumentList "/i", $installerPath, "/quiet", "/norestart" -Wait
    Write-Host "Azure CLI installed successfully"
    # Add Azure CLI to PATH
    $azCliBin = "C:\Program Files (x86)\Microsoft SDKs\Azure\CLI2\wbin"
    if (!(Test-Path $azCliBin)) {
      Write-Error "Azure CLI install failed or path not found: $azCliBin"
      exit 1
    }
    $env:PATH = "$azCliBin;$env:PATH"
    
    Write-Host "Downloading AzCopy..."
    $azcopyUrl = "https://aka.ms/downloadazcopy-v10-windows"
    $azcopyZip = "$(Agent.TempDirectory)\azcopy.zip"
    Invoke-WebRequest -Uri $azcopyUrl -OutFile $azcopyZip
    $azcopyExtractPath = "$(Agent.TempDirectory)\azcopy"
    Expand-Archive -Path $azcopyZip -DestinationPath $azcopyExtractPath -Force
    # Find the actual azcopy.exe (it's in a versioned subfolder)
    $azcopyExeFile = Get-ChildItem -Path $azcopyExtractPath -Name "azcopy.exe" -Recurse | Select-Object -First 1
    if (-not $azcopyExeFile) {
      Write-Error "AzCopy executable not found after extraction"
      exit 1
    }
    $azcopyFullPath = Get-ChildItem -Path $azcopyExtractPath -Filter "azcopy.exe" -Recurse | Select-Object -First 1
    $azcopyDir = $azcopyFullPath.Directory.FullName
    Write-Host "AzCopy found at: $azcopyDir"
    $env:PATH = "$azcopyDir;$env:PATH"
    
    Write-Host "##vso[task.setvariable variable=PATH]$env:PATH"
    # Verify installations
    az --version
    azcopy --version
  displayName: 'Install Azure CLI and AzCopy'
  condition: and(eq(variables['arch'], 'arm64'), or(eq(variables['ep'], 'winml'), eq(variables['ep'], 'cuda')))
  workingDirectory: '$(Build.Repository.LocalPath)'

- ${{ if and(or(eq(parameters.ep, 'cuda'), eq(parameters.ep, 'winml')), eq(parameters.arch, 'arm64')) }}:
  - task: AzureCLI@2
    displayName: 'Download CUDA $(cuda_version)'
    inputs:
      azureSubscription: 'ortcibuild_readonly_mi2-ONNX Runtime'
      scriptType: batch
      scriptLocation: inlineScript
      inlineScript: |
        set AZCOPY_AUTO_LOGIN_TYPE=AZCLI
        azcopy cp --recursive "https://lotusscus.blob.core.windows.net/models/cuda_sdk/win-arm64/v$(cuda_version)" "cuda_sdk"

- ${{ if or(eq(parameters.ep, 'cuda'), eq(parameters.ep, 'winml')) }}:
  - powershell: |
      if ('$(cuda_version)' -like '13.*') {
        $cuda_archs = "75-real;80-real;86-real;89-real;90-real;100-real;120-real;120-virtual"
      } else {
        $cuda_archs = "60-real;70-real;75-real;80-real;86-real;89-real;90-real;100-real;120"
      }
      Write-Host "##vso[task.setvariable variable=cuda_archs]$cuda_archs"
    displayName: 'Set cuda_archs for ONNXRuntime GenAI'

- powershell: |
    $exePath = "$env:TEMP\rustup-init.exe"
    (New-Object Net.WebClient).DownloadFile('https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe', $exePath)
    & $exePath -y --default-toolchain=1.86.0
    $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
    Write-Host "##vso[task.setvariable variable=PATH]$env:PATH"
  displayName: 'Install Rust Toolchain'
  workingDirectory: '$(Build.Repository.LocalPath)'

- powershell: |
    $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/LLVM-18.1.8-woa64.exe"
    $installerPath = "$(Agent.TempDirectory)\LLVM-18.1.8-woa64.exe"
    Write-Host "Downloading LLVM..."
    Invoke-WebRequest -Uri $llvmUrl -OutFile $installerPath
    Write-Host "Installing LLVM silently..."
    Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait
    # Add LLVM to PATH
    $llvmBin = "C:\Program Files\LLVM\bin"
    if (!(Test-Path $llvmBin)) {
      Write-Error "LLVM install failed or path not found: $llvmBin"
      exit 1
    }
    $env:PATH = "$llvmBin;$env:PATH"
    Write-Host "##vso[task.setvariable variable=PATH]$env:PATH"
    # Confirm clang installed
    clang --version
    python -m pip install wheel
  displayName: 'Install LLVM'
  condition: eq(variables['arch'], 'arm64')
  workingDirectory: '$(Build.Repository.LocalPath)'

- ${{ if or(ne(parameters.ort_build_version, 'default'), and(eq(parameters.ep, 'cuda'), eq(parameters.arch, 'arm64'))) }}:
  - powershell: |
      $ep = "$(ep)"
      $arch = "$(arch)"

      switch ($ep) {
          "cuda" { $packageName = if ($arch -eq "arm64") { "Microsoft.ML.OnnxRuntime" } else { "Microsoft.ML.OnnxRuntime.Gpu.Windows" } }
          "directml" { $packageName = "Microsoft.ML.OnnxRuntime.DirectML" }
          default { $packageName = "Microsoft.ML.OnnxRuntime" }
      }

      $orgName = "aiinfra"
      $feedProject = "2692857e-05ef-43b4-ba9c-ccf1c22c437c"
      $feedId = "7982ae20-ed19-4a35-a362-a96ac99897b7"
      $version = "${{ parameters.ort_build_version }}"
      if ($version -eq "default") {
          $version = "$(ort_version)"
      }
      if ([string]::IsNullOrWhiteSpace($version)) {
          Write-Error "ORT build version is empty. Set ort_build_version or pass the appropriate ORT version parameter for $ep/$arch."
          exit 1
      }

      $source = "${{ parameters.ort_build_source }}"
      if ($source -eq "Ort-Nightly") {
          $url = "https://pkgs.dev.azure.com/$orgName/$feedProject/_apis/packaging/feeds/$feedId/nuget/packages/$packageName/versions/$version/content?api-version=6.0-preview.1"
      } else {
          $url = "https://www.nuget.org/api/v2/package/$packageName/$version"
      }

      Write-Host "Downloading $packageName version $version"
      $downloadPath = "$(Agent.TempDirectory)\ort_build_pkg.zip"
      Invoke-WebRequest -Uri $url -OutFile $downloadPath -ErrorAction Stop

      $extractPath = "$(Agent.TempDirectory)\ort_build_extracted"
      if (Test-Path $extractPath) {
          Remove-Item -Path $extractPath -Recurse -Force
      }
      Expand-Archive -Path $downloadPath -DestinationPath $extractPath -Force -ErrorAction Stop

      $ortHome = "$(Build.Repository.LocalPath)\ort_build"
      New-Item -ItemType Directory -Force -Path "$ortHome\include"
      New-Item -ItemType Directory -Force -Path "$ortHome\lib"

      # Copy headers
      # CUDA packages store headers in buildTransitive/native/include, while other
      # ORT packages (CPU, DML) use build/native/include per NuGet package layout.
      # CUDA arm64 currently builds against the CPU ORT package, which uses build/native/include.
      if ($ep -eq "cuda" -and $arch -ne "arm64") {
          $headerSrc = "$extractPath\buildTransitive\native\include"
      } else {
          $headerSrc = "$extractPath\build\native\include"
      }
      Copy-Item "$headerSrc\*" "$ortHome\include\" -Recurse -Force

      # Copy libraries
      $platform = if ($arch -eq "arm64") { "win-arm64" } else { "win-x64" }
      Copy-Item "$extractPath\runtimes\$platform\native\*" "$ortHome\lib\" -Recurse -Force

      Write-Host "ORT_HOME: $ortHome"
      Get-ChildItem "$ortHome" -Recurse | Select-Object FullName
      Write-Host "##vso[task.setvariable variable=ORT_HOME_CMAKE_ARG]-DORT_HOME=$ortHome"
    displayName: 'Download ORT build package'
    condition: ne(variables['ep'], 'winml')
    workingDirectory: '$(Build.Repository.LocalPath)'

# Build the pybind extension (and, for EPs without a dedicated core producer, the
# native core) via build.py. The wheel zip is deferred (BUILD_WHEEL=ON but
# PyPackageBuild is not run yet) so the .pyd can be ESRP-signed before packaging.
- ${{ if eq(parameters.target, 'python') }}:
  - ${{ if eq(parameters.prebuilt_core, true) }}:
    - task: DownloadPipelineArtifact@2
      displayName: 'Download prebuilt core (incremental)'
      inputs:
        artifact: $(artifactName)-core
        targetPath: '$(Build.Repository.LocalPath)\coreexport'

    - powershell: |
        $ErrorActionPreference = "Stop"
        $cfg = switch ("$(build_config)") {
          "release"        { "Release" }
          "relwithdebinfo" { "RelWithDebInfo" }
          "debug"          { "Debug" }
          default          { "Release" }
        }
        Write-Host "##vso[task.setvariable variable=cmakeBuildType;]$cfg"
        python -m pip install --quiet requests pybind11 wheel build
        # Incremental: compile only the pybind extension against the prebuilt core.
        # --skip_wheel keeps BUILD_WHEEL=ON (from the standalone SDK config) but defers
        # the pip-wheel zip so the .pyd can be signed first.
        $buildArgs = @(
          "--config", $cfg,
          "--parallel",
          "--sdk", "python",
          "--prebuilt_genai_home", "$(Build.Repository.LocalPath)\coreexport\prefix",
          "--ort_home", "$(Build.Repository.LocalPath)\coreexport\ort",
          "--skip_wheel",
          "--build_dir", "$(Build.Repository.LocalPath)\build\$(ep)"
        )
        if ("$(arch)" -eq "arm64") { $buildArgs += "--arm64" }
        Write-Host "python build.py $buildArgs"
        python build.py @buildArgs
      displayName: 'Build Python extension $(PyNoDotVer) (prebuilt core)'
      workingDirectory: '$(Build.Repository.LocalPath)'

  - ${{ if ne(parameters.prebuilt_core, true) }}:
    - powershell: |
        $ErrorActionPreference = "Stop"
        $cfg = switch ("$(build_config)") {
          "release"        { "Release" }
          "relwithdebinfo" { "RelWithDebInfo" }
          "debug"          { "Debug" }
          default          { "Release" }
        }
        Write-Host "##vso[task.setvariable variable=cmakeBuildType;]$cfg"
        python -m pip install --quiet requests pybind11 wheel build
        # Self-contained: build the native core and the pybind extension together.
        # --skip_wheel + BUILD_WHEEL=ON defers only the pip-wheel zip so the .pyd can
        # be signed before packaging.
        $buildArgs = @(
          "--config", $cfg,
          "--parallel",
          "--skip_tests",
          "--skip_examples",
          "--skip_wheel",
          "--use_guidance",
          "--build_dir", "$(Build.Repository.LocalPath)\build\$(ep)"
        )
        if ("$(arch)" -eq "arm64") { $buildArgs += "--arm64" }
        $cudaHome = "$(Build.Repository.LocalPath)\cuda_sdk\v$(cuda_version)"
        $extraDefines = @("ENABLE_TESTS=OFF", "BUILD_WHEEL=ON")
        switch ("$(ep)") {
          "cuda"     { $buildArgs += @("--use_cuda", "--cuda_home", $cudaHome, "--cuda_archs", "$(cuda_archs)") }
          "directml" { $buildArgs += @("--use_dml") }
          "winml"    { $buildArgs += @("--use_winml", "--winml_sdk_version", "$(ort_version)", "--use_cuda", "--cuda_home", $cudaHome, "--cuda_archs", "$(cuda_archs)") }
        }
        $ortArg = "$(ORT_HOME_CMAKE_ARG)"
        if ($ortArg -match '^-DORT_HOME=(.*)$') { $buildArgs += @("--ort_home", $Matches[1]) }
        $buildArgs += @("--cmake_extra_defines") + $extraDefines
        Write-Host "python build.py $buildArgs"
        python build.py @buildArgs
      displayName: 'Build Python extension $(PyNoDotVer) (full build)'
      workingDirectory: '$(Build.Repository.LocalPath)'

- ${{ if eq(parameters.target, 'onnxruntime-genai') }}:
  - powershell: |
      $ErrorActionPreference = "Stop"
      # Map the pipeline's lowercase build config to build.py's capitalized --config
      # and publish it for the later packaging/symbol steps (build.py appends the
      # config to --build_dir, so artifacts live under build\<ep>\<Config>).
      $cfg = switch ("$(build_config)") {
        "release"        { "Release" }
        "relwithdebinfo" { "RelWithDebInfo" }
        "debug"          { "Debug" }
        default          { "Release" }
      }
      Write-Host "##vso[task.setvariable variable=cmakeBuildType;]$cfg"

      $buildArgs = @(
        "--config", $cfg,
        "--parallel",
        "--skip_tests",
        "--skip_examples",
        "--skip_wheel",
        "--use_guidance",
        "--install_dir", "$(Build.Repository.LocalPath)\build\$(ep)\coreexport\prefix",
        "--build_dir", "$(Build.Repository.LocalPath)\build\$(ep)",
        "--cmake_extra_defines", "ENABLE_PYTHON=OFF", "ENABLE_TESTS=OFF"
      )
      if ("$(arch)" -eq "arm64") { $buildArgs += "--arm64" }
      $cudaHome = "$(Build.Repository.LocalPath)\cuda_sdk\v$(cuda_version)"
      switch ("$(ep)") {
        "cuda"     { $buildArgs += @("--use_cuda", "--cuda_home", $cudaHome, "--cuda_archs", "$(cuda_archs)") }
        "directml" { $buildArgs += @("--use_dml") }
        "winml"    { $buildArgs += @("--use_winml", "--winml_sdk_version", "$(ort_version)", "--use_cuda", "--cuda_home", $cudaHome, "--cuda_archs", "$(cuda_archs)") }
      }
      # Reuse the ORT_HOME the download step resolved (empty for the fetch-from-source path).
      $ortArg = "$(ORT_HOME_CMAKE_ARG)"
      if ($ortArg -match '^-DORT_HOME=(.*)$') { $buildArgs += @("--ort_home", $Matches[1]) }

      Write-Host "python build.py $buildArgs"
      python -m pip install --quiet requests
      python build.py @buildArgs
    displayName: 'Build GenAI core (build.py)'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - template: compliant/win-esrp-dll-step.yml
    parameters:
      FolderPath: '$(Build.Repository.LocalPath)\$(buildDir)'
      DisplayName: 'ESRP - Sign C++ dlls'
      Pattern: '*genai*.dll'

  - task: BinSkim@4
    displayName: 'Run BinSkim'
    inputs:
      AnalyzeTargetGlob: '$(Build.Repository.LocalPath)\**\*genai.dll'
    continueOnError: true

  - powershell: |
      python -m pip install wheel
    displayName: 'Install wheel'

  - powershell: |
      # Run CPack against the (now signed) build tree to produce
      # onnxruntime-genai-<ver>-win-<arch>[-<ep>].zip with the top-level layout the
      # NuGet packer consumes. Packaging after signing keeps the signed DLLs.
      cmake --build "$(Build.Repository.LocalPath)\build\$(ep)\$(cmakeBuildType)" --config $(cmakeBuildType) --target package --parallel
    displayName: 'Package C/C++ API'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish Artifact: ONNXRuntime GenAI capi'
    inputs:
      artifactName: $(artifactName)-capi
      targetPath: '$(Build.Repository.LocalPath)\build\$(ep)\$(cmakeBuildType)\package'

  - powershell: |
      $ErrorActionPreference = "Stop"
      # Assemble an ONNX Runtime home (headers + libs/dlls) next to the exported core
      # so the incremental Python/Java SDK builds compile the binding against the same
      # ONNX Runtime this core was built with (single ORT source).
      $base = "$(Build.Repository.LocalPath)\build\$(ep)"
      $ortOut = "$base\coreexport\ort"
      New-Item -ItemType Directory -Force -Path "$ortOut\include", "$ortOut\lib" | Out-Null
      if (Test-Path "$(Build.Repository.LocalPath)\ort_build\lib") {
        Copy-Item "$(Build.Repository.LocalPath)\ort_build\include\*" "$ortOut\include\" -Recurse -Force
        Copy-Item "$(Build.Repository.LocalPath)\ort_build\lib\*" "$ortOut\lib\" -Recurse -Force
      } else {
        $ortsrc = "$base\$(cmakeBuildType)\_deps\ortlib-src"
        if (Test-Path "$ortsrc\build\native\include") {
          Copy-Item "$ortsrc\build\native\include\*" "$ortOut\include\" -Recurse -Force
        } else {
          Copy-Item "$ortsrc\buildTransitive\native\include\*" "$ortOut\include\" -Recurse -Force
        }
        $rid = if ("$(arch)" -eq "arm64") { "win-arm64" } else { "win-x64" }
        Copy-Item "$ortsrc\runtimes\$rid\native\*" "$ortOut\lib\" -Recurse -Force
      }
      Get-ChildItem "$ortOut\include", "$ortOut\lib"
    displayName: 'Assemble core export (ORT home)'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish Artifact: ONNXRuntime GenAI core export'
    inputs:
      artifactName: $(artifactName)-core
      targetPath: '$(Build.Repository.LocalPath)\build\$(ep)\coreexport'

  - task: PublishSymbols@2
    displayName: 'Publish Build Symbols'
    condition: and(succeeded(), eq(variables['build_config'], 'relwithdebinfo'))
    inputs:
      SymbolsFolder: '$(Build.Repository.LocalPath)\build\$(ep)\$(cmakeBuildType)'
      SearchPattern: 'onnxruntime-genai*.pdb'
      SymbolServerType: teamServices
      SymbolExpirationInDays: 365

- ${{ if eq(parameters.target, 'python') }}:
  - task: BinSkim@4
    displayName: 'Run BinSkim'
    inputs:
      AnalyzeTargetGlob: '$(Build.Repository.LocalPath)\**\*.pyd'
    continueOnError: true

  # Sign the staged extension before the wheel is zipped (the .pyd cannot be signed
  # once it is inside the .whl archive). build.py stages it under
  # build\<ep>\<Config>\wheel\onnxruntime_genai via the BUILD_WHEEL POST_BUILD copy.
  - template: compliant/win-esrp-dll-step.yml
    parameters:
      FolderPath: '$(Build.Repository.LocalPath)\build\$(ep)\$(cmakeBuildType)\wheel\onnxruntime_genai'
      DisplayName: 'ESRP - PYD Sign'
      DoEsrp: true
      Pattern: '*.pyd,*.dll'

  - powershell: |
      # Zip the signed extension into the wheel (deferred PyPackageBuild target).
      cmake --build "$(Build.Repository.LocalPath)\build\$(ep)\$(cmakeBuildType)" --config $(cmakeBuildType) --parallel --target PyPackageBuild
    displayName: 'Package Python Wheel'
    workingDirectory: '$(Build.Repository.LocalPath)'

  - task: CopyFiles@2
    displayName: 'Copy Python Wheel to: $(Build.ArtifactStagingDirectory)'
    inputs:
      SourceFolder: '$(Build.Repository.LocalPath)\build\$(ep)'
      Contents: '**\wheel\*.whl'
      TargetFolder: '$(Build.ArtifactStagingDirectory)\wheel'
      flattenFolders: true

  - task: 1ES.PublishPipelineArtifact@1
    displayName: 'Publish Artifact: ONNXRuntime python wheel'
    inputs:
      artifactName: $(artifactName)-$(PyNoDotVer)-wheel
      targetPath: '$(Build.ArtifactStagingDirectory)\wheel'

  - task: PublishSymbols@2
    displayName: 'Publish Build Symbols'
    condition: and(succeeded(), eq(variables['build_config'], 'relwithdebinfo'))
    inputs:
      SymbolsFolder: '$(Build.Repository.LocalPath)\build\$(ep)\$(cmakeBuildType)'
      SearchPattern: 'onnxruntime_genai.pdb'
      SymbolServerType: teamServices
      SymbolExpirationInDays: 365
