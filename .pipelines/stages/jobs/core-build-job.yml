# =============================================================================
# core-build-job.yml — Reusable core build job template (Phase 1).
#
# Selects the appropriate agent pool for the requested OS/arch, defines
# job-level variables, and dispatches to the OS-specific step template
# (core-win-step.yml, core-linux-step.yml).
#
# Artifact naming convention (matches plan.md §Display-name convention):
#   core-<os>-<arch>-<ep>-cmake-pkg   — exported find_package CMake package
#   core-<os>-<arch>-<ep>-archive     — CPack archive (zip/tgz)
# =============================================================================

parameters:
- name: os
  type: string
  values: [win, linux]
- name: arch
  type: string
  values: [x64, arm64]
- name: ep
  type: string
  values: [cpu, cuda]
- name: build_config
  type: string
  default: Release
- name: ort_version
  type: string
- name: cuda_version
  type: string
  default: ''

jobs:
- job: core_${{ parameters.os }}_${{ parameters.arch }}_${{ parameters.ep }}
  displayName: 'core · ${{ parameters.os }}-${{ parameters.arch }} · ${{ parameters.ep }}'

  ${{ if eq(parameters.os, 'linux') }}:
    pool:
      ${{ if eq(parameters.arch, 'arm64') }}:
        name: 'onnxruntime-linux-ARM64-CPU-2019'
        hostArchitecture: Arm64
      ${{ else }}:
        name: 'onnxruntime-Ubuntu2204-AMD-CPU'
      os: linux

  ${{ if eq(parameters.os, 'win') }}:
    pool:
      ${{ if eq(parameters.arch, 'arm64') }}:
        name: 'onnxruntime-genai-windows-vs-2022-arm64'
        hostArchitecture: Arm64
        demands:
          - Agent.Version -equals 4.264.2
      ${{ else }}:
        name: 'onnxruntime-Win-CPU-2022'
      os: windows

  timeoutInMinutes: 180
  workspace:
    clean: all

  variables:
  - name: artifactName
    value: 'core-${{ parameters.os }}-${{ parameters.arch }}-${{ parameters.ep }}'
  # ORT install root — overridden inside docker on Linux (uses /ort_genai_src/ort_home)
  - name: ortHome
    ${{ if eq(parameters.os, 'win') }}:
      value: '$(Build.SourcesDirectory)\ort_home'
    ${{ else }}:
      value: '$(Build.SourcesDirectory)/ort_home'
  # CMake package install prefix (SDK handoff artifact)
  - name: coreInstall
    ${{ if eq(parameters.os, 'win') }}:
      value: '$(Build.SourcesDirectory)\install'
    ${{ else }}:
      value: '$(Build.SourcesDirectory)/install'
  # build.py --build_dir (relative; build.py appends /<config> internally)
  - name: buildDir
    value: 'build/core'

  steps:
  - checkout: self
    submodules: recursive
    lfs: true
    clean: true

  - ${{ if eq(parameters.os, 'win') }}:
    - template: steps/core-win-step.yml
      parameters:
        arch: ${{ parameters.arch }}
        ep: ${{ parameters.ep }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        cuda_version: ${{ parameters.cuda_version }}

  - ${{ if eq(parameters.os, 'linux') }}:
    - template: steps/core-linux-step.yml
      parameters:
        arch: ${{ parameters.arch }}
        ep: ${{ parameters.ep }}
        build_config: ${{ parameters.build_config }}
        ort_version: ${{ parameters.ort_version }}
        cuda_version: ${{ parameters.cuda_version }}

  - template: steps/compliant-and-cleanup-step.yml
