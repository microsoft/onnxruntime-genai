# Stage 2 (SDK) — Python wheel built incrementally against the prebuilt core.
# Downloads the Stage 1 core artifact and runs build.py --prebuilt_genai_home so the
# wheel only compiles the pybind extension (the core is never rebuilt).
parameters:
- name: os
  type: string
  values: ['linux', 'win', 'osx']
- name: arch
  type: string
- name: ep
  type: string
  default: 'cpu'
- name: cuda_version
  type: string
  default: ''
- name: build_config
  type: string
  default: 'RelWithDebInfo'
- name: ort_version
  type: string
  default: ''
- name: ort_build_version
  type: string
  default: 'default'
- name: ort_build_source
  type: string
  default: 'NuGet'
# Python minor versions to build wheels for (manylinux on Linux).
- name: python_versions
  type: object
  default: ['3.11', '3.12', '3.13', '3.14']

jobs:
- job: wheel_${{ parameters.os }}_${{ parameters.ep }}_${{ parameters.arch }}
  displayName: '${{ parameters.os }} ${{ parameters.arch }} · ${{ parameters.ep }}'
  ${{ if eq(parameters.os, 'linux') }}:
    pool:
      ${{ if eq(parameters.arch, 'x64') }}:
        name: 'onnxruntime-Ubuntu2204-AMD-CPU'
      ${{ else }}:
        name: 'onnxruntime-linux-ARM64-CPU-2019'
        hostArchitecture: 'Arm64'
      os: linux
  ${{ if eq(parameters.os, 'win') }}:
    pool:
      ${{ if eq(parameters.arch, 'x64') }}:
        name: 'onnxruntime-Win-CPU-2022'
      ${{ else }}:
        name: 'onnxruntime-genai-windows-vs-2022-arm64'
        hostArchitecture: 'Arm64'
        demands:
          - Agent.Version -equals 4.264.2
      os: windows
  ${{ if eq(parameters.os, 'osx') }}:
    pool:
      name: 'Azure Pipelines'
      image: 'macOS-latest'
      os: 'macOS'

  dependsOn: []
  timeoutInMinutes: 120
  variables:
  - name: arch
    value: ${{ parameters.arch }}
  - name: ep
    value: ${{ parameters.ep }}
  - name: os
    value: ${{ parameters.os }}
  - name: cuda_version
    value: ${{ parameters.cuda_version }}
  - name: ort_version
    value: ${{ parameters.ort_version }}
  - name: build_config
    value: ${{ parameters.build_config }}
  - name: artifactName
    value: 'onnxruntime-genai-${{ parameters.os }}-${{ parameters.ep }}-${{ parameters.arch }}'
  # Local path where the Stage 1 core artifact is downloaded.
  - name: coreHome
    value: '$(Build.Repository.LocalPath)/core'
  - name: ORT_HOME_ARG
    value: ''

  workspace:
    clean: all
  steps:
  - checkout: self
    clean: true
    path: onnxruntime-genai
    submodules: recursive

  - task: DownloadPipelineArtifact@2
    displayName: 'Download prebuilt core'
    inputs:
      artifactName: '$(artifactName)-core'
      targetPath: '$(coreHome)'

  - ${{ if eq(parameters.os, 'linux') }}:
    - template: steps/build-wheel-linux-step.yml
      parameters:
        ep: ${{ parameters.ep }}
        arch: ${{ parameters.arch }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}
        python_versions: ${{ parameters.python_versions }}

  - ${{ if ne(parameters.os, 'linux') }}:
    - template: steps/build-wheel-step.yml
      parameters:
        os: ${{ parameters.os }}
        ep: ${{ parameters.ep }}
        arch: ${{ parameters.arch }}
        build_config: ${{ parameters.build_config }}
        ort_build_version: ${{ parameters.ort_build_version }}
        ort_build_source: ${{ parameters.ort_build_source }}

  - template: steps/compliant-and-cleanup-step.yml
