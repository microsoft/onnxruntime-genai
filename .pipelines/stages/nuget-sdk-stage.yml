# Stage 2 (SDK) — NuGet packaging. Incremental: downloads the Stage 1 C/C++ archives
# (*-capi) for every enabled RID and packs the native + managed NuGet packages. The
# native core is never rebuilt here. CPU and CUDA only (DML/WinML dropped).
parameters:
- name: enable_linux_x64_cpu
  type: boolean
  default: true
- name: enable_linux_arm64_cpu
  type: boolean
  default: true
- name: enable_linux_x64_cuda
  type: boolean
  default: true
- name: enable_win_x64_cpu
  type: boolean
  default: true
- name: enable_win_arm64_cpu
  type: boolean
  default: true
- name: enable_win_x64_cuda
  type: boolean
  default: true
- name: enable_win_arm64_cuda
  type: boolean
  default: true
- name: enable_macos_arm64_cpu
  type: boolean
  default: true
- name: enable_android
  type: boolean
  default: true
- name: enable_apple_framework
  type: boolean
  default: true
- name: ort_version
  type: string
- name: ort_cuda_version
  type: string
- name: build_config
  type: string
  default: 'RelWithDebInfo'
- name: nuget_version_type
  type: string
  default: 'stable'

stages:
- stage: nuget_packaging
  displayName: 'NuGet Packages'
  dependsOn:
  - core_build
  - ${{ if eq(parameters.enable_android, true) }}:
    - Build_Android_AAR
  - ${{ if eq(parameters.enable_apple_framework, true) }}:
    - Build_MacOS_iOS_CocoaPods_Archive
  jobs:
  - ${{ if or(eq(parameters.enable_linux_x64_cpu, true), eq(parameters.enable_linux_arm64_cpu, true), eq(parameters.enable_win_x64_cpu, true), eq(parameters.enable_win_arm64_cpu, true), eq(parameters.enable_macos_arm64_cpu, true)) }}:
    - template: jobs/nuget-packaging-job.yml
      parameters:
        ep: 'cpu'
        ort_version: ${{ parameters.ort_version }}
        build_config: ${{ parameters.build_config }}
        enable_linux_x64_cpu: ${{ parameters.enable_linux_x64_cpu }}
        enable_linux_arm64_cpu: ${{ parameters.enable_linux_arm64_cpu }}
        enable_win_x64_cpu: ${{ parameters.enable_win_x64_cpu }}
        enable_win_arm64: ${{ parameters.enable_win_arm64_cpu }}
        enable_macos_cpu: ${{ parameters.enable_macos_arm64_cpu }}
        enable_android: ${{ parameters.enable_android }}
        enable_apple_framework: ${{ parameters.enable_apple_framework }}
        nuget_version_type: ${{ parameters.nuget_version_type }}

  - ${{ if or(eq(parameters.enable_linux_x64_cuda, true), eq(parameters.enable_win_x64_cuda, true), eq(parameters.enable_win_arm64_cuda, true)) }}:
    - template: jobs/nuget-packaging-job.yml
      parameters:
        ep: 'cuda'
        ort_version: ${{ parameters.ort_cuda_version }}
        build_config: ${{ parameters.build_config }}
        enable_linux_cuda: ${{ parameters.enable_linux_x64_cuda }}
        enable_win_cuda: ${{ parameters.enable_win_x64_cuda }}
        enable_win_arm64: ${{ parameters.enable_win_arm64_cuda }}
        nuget_version_type: ${{ parameters.nuget_version_type }}
