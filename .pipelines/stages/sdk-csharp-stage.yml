# =============================================================================
# sdk-csharp-stage.yml — C# NuGet SDK stage (Phase 3 / consolidated Phase 5).
#
# ALL C# NuGet packages are produced by this single stage, one job per EP:
#   cpu     — Microsoft.ML.OnnxRuntimeGenAI          (win-x64, linux-x64/arm64, osx-arm64, ios, android)
#   cuda    — Microsoft.ML.OnnxRuntimeGenAI.Cuda     (win-x64, linux-x64)
#   winml   — Microsoft.ML.OnnxRuntimeGenAI.WinML    (win-x64)
#   foundry — Microsoft.ML.OnnxRuntimeGenAI.Foundry  (cuda+cpu RID mix; both EPs)
#
# Each job depends (via the stage) on the core stage(s) for the EP(s) it consumes.
#
# Display-name / artifact convention:
#   Stage:    SDK · C#
#   Jobs:     csharp · nuget · <ep>
#   Artifact: csharp-nuget-<ep>
# =============================================================================

parameters:
# Runtime onnxruntime dependency version for the C# NuGet <dependency> (the C#
# jobs repackage prebuilt cores and do not build against ORT, so no build-time
# ORT version is needed here). Shared with the Python wheel dependency.
- name: ort_dependency_version
  type: string
- name: winml_sdk_version
  type: string
- name: build_config
  type: string
  default: Release

- name: enable_cpu
  type: boolean
  default: true
- name: enable_cuda
  type: boolean
  default: true
- name: enable_winml
  type: boolean
  default: true

stages:
- stage: sdk_csharp
  displayName: 'SDK · C#'
  # Depend on the version stage (shared package version) + the core stage(s) any
  # of this stage's jobs consume. For CPU we also bundle the iOS xcframework
  # (core_apple) and Android AAR (sdk_android) into the CPU native package.
  dependsOn:
  - version
  - ${{ if eq(parameters.enable_cpu, true) }}:
    - core_cpu
    - core_apple
    - sdk_android
  - ${{ if eq(parameters.enable_cuda, true) }}:
    - core_cuda
  - ${{ if eq(parameters.enable_winml, true) }}:
    - core_winml
  # Shared package version computed once by the 'version' stage.
  variables:
  - name: genai_version
    value: $[ stageDependencies.version.set_version.outputs['setver.genai_version'] ]
  jobs:

  # ---- CPU combine job -----------------------------------------------------
  - ${{ if eq(parameters.enable_cpu, true) }}:
    - template: jobs/sdk-csharp-job.yml
      parameters:
        ep: cpu
        ort_dependency_version: ${{ parameters.ort_dependency_version }}
        build_config: ${{ parameters.build_config }}
        enable_win_x64: true
        enable_win_arm64: true
        enable_linux_x64: true
        enable_linux_arm64: true
        enable_osx_arm64: true
        enable_ios: true
        enable_android: true

  # ---- CUDA combine job ----------------------------------------------------
  - ${{ if eq(parameters.enable_cuda, true) }}:
    - template: jobs/sdk-csharp-job.yml
      parameters:
        ep: cuda
        ort_dependency_version: ${{ parameters.ort_dependency_version }}
        build_config: ${{ parameters.build_config }}
        enable_win_x64: true
        enable_win_arm64: true
        enable_linux_x64: true
        enable_linux_arm64: false

  # ---- WinML repackage job -------------------------------------------------
  - ${{ if eq(parameters.enable_winml, true) }}:
    - template: jobs/winml-nuget-job.yml
      parameters:
        winml_sdk_version: ${{ parameters.winml_sdk_version }}

  # ---- .Foundry repackage job (needs both CPU and CUDA core archives) ------
  - ${{ if and(eq(parameters.enable_cpu, true), eq(parameters.enable_cuda, true)) }}:
    - template: jobs/foundry-packaging-job.yml
