# =============================================================================
# Packaging scratch stage (Phase 3 pipeline check)
#
# Validates the core + Python SDK templates on real 1ES pool agents using a
# reduced matrix (win-x64 CPU + linux-x64 CPU).
#
# What this proves:
#   1. Core: build.py --use_guidance --install_dir + --package produce the
#      exported CMake package and CPack archive (Phase 1), feed-isolated (Phase 2).
#   2. SDK · Python: each wheel builds *incrementally* against the downloaded core
#      cmake-pkg artifact (core NOT recompiled), imports, and publishes.
#
# Phase 3 will also add C# and Java SDK stages; Phase 5 folds everything into
# packaging.yml and deletes this file.
# =============================================================================
parameters:
- name: ort_version
  type: string
- name: cuda_version
  type: string
  default: '13.1'

stages:
- template: core-packaging-stage.yml
  parameters:
    ort_version: ${{ parameters.ort_version }}
    cuda_version: ${{ parameters.cuda_version }}
    # Reduced matrix: win-x64 CPU + linux-x64 CPU for scratch validation.
    # Expand to the full matrix in Phase 5.
    enable_win_x64_cpu: true
    enable_linux_x64_cpu: true

- template: sdk-python-stage.yml
  parameters:
    ort_version: ${{ parameters.ort_version }}
    cuda_version: ${{ parameters.cuda_version }}
    # Match the reduced core matrix so each wheel has a core artifact to consume.
    enable_win_x64_cpu: true
    enable_linux_x64_cpu: true

- template: sdk-csharp-stage.yml
  parameters:
    ort_version: ${{ parameters.ort_version }}
    # Combine the reduced-matrix core CPU archives (win-x64 + linux-x64) into the
    # native + managed NuGet packages.
    enable_win_x64_cpu: true
    enable_linux_x64_cpu: true

- template: sdk-java-stage.yml
  parameters:
    ort_version: ${{ parameters.ort_version }}
    # Desktop JVM jar for the linux-x64 CPU core.
    enable_linux_x64_cpu: true



