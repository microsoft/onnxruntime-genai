# =============================================================================
# Packaging scratch stage (Phase 1 pipeline check)
#
# Validates the Phase 1 core packaging templates on real 1ES pool agents using
# a reduced matrix (win-x64 CPU + linux-x64 CPU).  Replaces the Phase 0 inline
# jobs which are now superseded by the reusable core-packaging-stage.yml.
#
# What this proves:
#   1. build.py --use_guidance --install_dir produces the exported CMake package.
#   2. build.py --package produces the CPack core archive.
#   3. Both artifacts publish via 1ES.PublishPipelineArtifact.
#   4. The artifact assertion steps (CMake files + archive) pass on real agents.
#
# Phase 2 will add feed isolation; Phase 3 will add SDK stages; Phase 5 will
# fold everything into packaging.yml and delete this file.
# =============================================================================
parameters:
- name: ort_version
  type: string
- name: cuda_version
  type: string
  default: '13.1'

stages:
- template: core-packaging-stage.yml
  parameters:
    ort_version: ${{ parameters.ort_version }}
    cuda_version: ${{ parameters.cuda_version }}
    # Reduced matrix: win-x64 CPU + linux-x64 CPU for Phase 1 scratch validation.
    # Expand to the full matrix in Phase 5.
    enable_win_x64_cpu: true
    enable_linux_x64_cpu: true
